name: LifeOS
options:
  bundleIdPrefix: com.saloni
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
targets:
  LifeOS:
    type: application
    platform: iOS
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Life OS
        CFBundleName: LifeOS
        CFBundleShortVersionString: "1.2"
        CFBundleVersion: "3"
        UILaunchScreen: {}
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: "Life OS reads your step count from Apple Health to track your daily movement goal."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: www
        type: folder
        buildPhase: resources
    entitlements:
      path: Generated/LifeOS.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saloni.lifeos
        PRODUCT_NAME: LifeOS
        MARKETING_VERSION: "1.2"
        CURRENT_PROJECT_VERSION: "3"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  LifeOS:
    build:
      targets:
        LifeOS: all
    run:
      config: Release
    archive:
      config: Release
