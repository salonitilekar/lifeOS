<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Life OS"/>
<meta name="theme-color" content="#0f0f0f"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Life OS</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css"/>
<style>
  :root{--bg:#0f0f0f;--bg2:#212121;--bg3:#303030;--bg4:#3f3f3f;--border:rgba(255,255,255,.08);--text:#fff;--sub:#aaa;--radius:12px;--radius-lg:16px;--radius-sm:8px;--font:"Geist Sans","Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--fs-sub:8px;--fs-btn:10px;--fs-title:12px;--fs-major:14px}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:var(--fs-major);font-weight:400;line-height:1.43;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom);-webkit-font-smoothing:antialiased}
  button,input,textarea,select{font-family:var(--font)}
  button{font-size:var(--fs-btn);cursor:pointer}
  .ic{display:inline-block;vertical-align:-0.15em;flex-shrink:0}
  .water-title,.steps-title,.food-title,.journal-title{display:inline-flex;align-items:center;gap:7px}
  .view-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .header{position:sticky;top:0;z-index:50;padding:14px 16px 12px;padding-top:max(14px,env(safe-area-inset-top));background:var(--bg);border-bottom:1px solid var(--border)}
  .header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .app-title{font-size:18px;font-weight:500;color:var(--text)}
  .header-meta{font-size:var(--fs-sub);color:var(--sub);margin-top:2px;font-weight:400}
  .header-stats{text-align:right}
  .stat-big{font-size:var(--fs-major);font-weight:500;color:var(--text)}
  .stat-label{font-size:var(--fs-sub);color:var(--sub);font-weight:400}
  .progress-bar{height:3px;background:var(--bg3);border-radius:100px;overflow:hidden}
  .progress-fill{height:3px;background:#3ea6ff;border-radius:100px;transition:width .4s}
  .day-nav{display:flex;gap:4px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
  .day-nav::-webkit-scrollbar{display:none}
  .day-btn{padding:5px 13px;border-radius:100px;border:none;background:var(--bg3);color:var(--sub);font-size:var(--fs-btn);white-space:nowrap;flex-shrink:0;transition:all .15s}
  .day-btn.today{color:#3ea6ff}
  .day-btn.active{background:var(--text);color:var(--bg)}
  .day-btn.today.active{background:#3ea6ff;color:#0f0f0f}
  .content{padding:12px 16px calc(118px + env(safe-area-inset-bottom))}
  /* Bottom navigation — YT Studio flat dock */
  .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:60;padding-bottom:max(6px,env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid var(--border)}
  .day-strip{display:flex;gap:6px;padding:10px 14px 4px}
  .dbtn{flex:1;padding:7px 0;border-radius:100px;border:none;background:var(--bg3);color:var(--sub);font-size:var(--fs-btn);font-weight:500;text-align:center;transition:all .15s}
  .dbtn.today{color:#3ea6ff}
  .dbtn.active{background:var(--text);color:var(--bg)}
  .dbtn.today.active{background:#3ea6ff;color:#0f0f0f}
  .tab-bar{display:flex;padding:2px 6px 8px}
  .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border:none;background:transparent;color:var(--sub);font-size:var(--fs-btn);font-weight:500;border-radius:var(--radius-sm);transition:color .15s}
  .tab-btn.active{color:var(--text)}
  .tab-btn.active .ic{color:var(--text);filter:none}
  /* Collapsed tracker summary */
  .track-collapsed{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:none;border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;cursor:pointer}
  .tc-title{display:inline-flex;align-items:center;gap:8px;font-size:var(--fs-title);font-weight:500;color:var(--text)}
  .tc-meta{display:inline-flex;align-items:center;gap:9px;font-size:var(--fs-major)}
  .tc-done{display:inline-flex;align-items:center;gap:3px;font-size:var(--fs-sub);color:#2ba870}
  .tc-meta .chevron{color:var(--sub)}
  .timer-card{border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;border:none;background:var(--bg2);border-left:3px solid var(--timer-accent,#3ea6ff)}
  .timer-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .timer-label{font-size:var(--fs-sub);color:var(--sub)}
  .timer-controls{display:flex;gap:6px}
  .timer-btn{font-size:var(--fs-btn);padding:5px 12px;border-radius:100px;border:none;background:var(--bg3);color:var(--text)}
  .timer-display{font-size:var(--fs-major);font-weight:500;font-variant-numeric:tabular-nums}
  .timer-bar{height:4px;background:var(--bg3);border-radius:100px;overflow:hidden;margin-top:10px}
  .timer-fill{height:4px;border-radius:100px;transition:width 1s linear}
  .timer-note{font-size:var(--fs-sub);color:var(--sub);margin-top:8px;display:inline-flex;align-items:center;gap:6px}
  .now-card{border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;border:none;background:var(--bg2);box-shadow:none}
  .now-label{font-size:var(--fs-sub);font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin-bottom:6px}
  .now-name{font-size:var(--fs-title);font-weight:500;margin-bottom:6px;color:var(--text)}
  .now-note{font-size:var(--fs-major);color:var(--sub);margin-bottom:14px;line-height:1.43;font-weight:400}
  .now-card .task-row{background:var(--bg3);border-radius:var(--radius-sm)}
  .task-row{display:flex;align-items:flex-start;gap:10px;padding:8px;border-radius:8px;cursor:pointer;margin-bottom:4px}
  .task-row:active{opacity:.7}
  .task-row.locked{cursor:default;opacity:.72}
  .task-row.locked:active{opacity:.72}
  .task-row.locked .chk{opacity:.55}
  .chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:var(--fs-sub);color:#fff;transition:all .15s}
  .task-text{font-size:var(--fs-major);font-weight:400;line-height:1.43;color:var(--text)}
  .task-text.done{text-decoration:line-through;opacity:.4}
  .start-timer-btn{margin-top:14px;font-size:var(--fs-btn);padding:10px 16px;border-radius:100px;border:none;color:#fff;font-weight:500;display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%}
  .next-block{background:var(--bg2);border-radius:var(--radius-lg);padding:14px 16px;border:none;margin-bottom:10px}
  .next-label{font-size:var(--fs-sub);color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .next-name{font-size:var(--fs-major);font-weight:500}
  .block-card{background:var(--bg2);border-radius:var(--radius-lg);border:none;margin-bottom:10px;overflow:hidden;transition:opacity .2s}
  .block-card.current{background:var(--bg3);border-left:3px solid var(--block-accent,#3ea6ff)}
  .block-card.past{opacity:.4}
  .block-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
  .block-time{font-size:var(--fs-sub);color:var(--sub);width:68px;flex-shrink:0}
  .block-name{flex:1;font-size:var(--fs-title);font-weight:500}
  .tag-pill{font-size:var(--fs-sub);padding:2px 8px;border-radius:100px;font-weight:500;flex-shrink:0}
  .block-prog{font-size:var(--fs-sub);color:var(--sub);margin-left:2px}
  .chevron{color:var(--sub);transition:transform .2s;flex-shrink:0;display:inline-flex;align-items:center;line-height:0}
  .chevron.open{transform:rotate(180deg)}
  .block-body{border-top:1px solid var(--border);padding:10px 16px 14px;display:none}
  .block-body.open{display:block}
  .block-note{font-size:var(--fs-sub);color:var(--sub);margin-top:10px;padding:10px 12px;background:var(--bg4);border-radius:var(--radius-sm);line-height:1.6;font-style:italic}
  .fixed-badge{font-size:var(--fs-sub);color:var(--sub);padding:2px 8px;border-radius:100px;background:var(--bg4);margin-left:6px;font-weight:400}
  .mini-timer-btn{margin-top:10px;font-size:var(--fs-btn);padding:6px 14px;border-radius:100px;border:none;background:var(--bg3);color:var(--text);display:inline-flex;align-items:center;gap:6px}
  .week-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--radius-lg);border:none;background:var(--bg2);margin-bottom:10px;cursor:pointer}
  .week-row.today{box-shadow:inset 3px 0 0 #3ea6ff}
  .week-day{font-size:var(--fs-title);font-weight:500;width:32px;flex-shrink:0}
  .week-meta{flex:1;min-width:0}
  .week-theme{font-size:var(--fs-title);font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .week-bar{height:3px;background:var(--bg3);border-radius:100px;overflow:hidden}
  .week-fill{height:3px;border-radius:100px}
  .week-count{font-size:var(--fs-sub);color:var(--sub);flex-shrink:0}
  .rescue-toggle{width:100%;margin-top:14px;padding:10px;border-radius:var(--radius-lg);border:none;background:var(--bg2);color:var(--sub);font-size:var(--fs-btn);display:inline-flex;align-items:center;justify-content:center;gap:7px}
  .rescue-panel{margin-top:10px;background:var(--bg2);border-radius:var(--radius-lg);padding:16px}
  .rescue-title{font-size:var(--fs-title);font-weight:500;color:var(--text);margin-bottom:10px}
  .rescue-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .rescue-item{padding:12px;border-radius:var(--radius-sm);border:none;background:var(--bg3);cursor:pointer}
  .rescue-item:active{opacity:.7}
  .rescue-item b{display:block;font-size:var(--fs-title);font-weight:500;color:var(--text);margin-bottom:2px}
  .rescue-item span{font-size:var(--fs-sub);color:var(--sub)}
  .install-banner{margin:0 16px 12px;background:var(--bg2);border-radius:var(--radius-lg);padding:14px 16px;border:none;display:flex;align-items:center;gap:10px}
  .install-text{flex:1;font-size:var(--fs-sub);color:var(--sub);line-height:1.5}
  .install-text b{color:var(--text)}
  .install-close{color:var(--sub);background:none;border:none;padding:4px;display:inline-flex;align-items:center;line-height:0}

  /* Water tracker */
  .water-section{background:var(--bg2);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px}
  .water-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .water-title{font-size:var(--fs-title);font-weight:500;color:var(--text)}
  .water-val{font-size:var(--fs-major);font-weight:500;color:#378ADD}
  .water-goal-txt{font-size:var(--fs-sub);color:var(--sub);font-weight:400}
  .water-slider-wrap{position:relative;padding:8px 0}
  .water-track{display:flex;justify-content:space-between;align-items:center;position:relative}
  .water-track::before{content:'';position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:4px;background:var(--bg3);border-radius:100px;z-index:0}
  .water-fill-bar{position:absolute;left:0;top:50%;transform:translateY(-50%);height:4px;background:#378ADD;border-radius:100px;z-index:1;transition:width .3s}
  .water-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--bg4);background:var(--bg3);cursor:pointer;z-index:2;position:relative;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .water-dot.active{background:#378ADD;border-color:#378ADD;transform:scale(1.2)}
  .water-dot.filled{background:#378ADD;border-color:#378ADD}
  .water-labels{display:flex;justify-content:space-between;margin-top:6px}
  .water-lbl{font-size:var(--fs-sub);color:var(--sub);text-align:center;width:20px}

  /* Food log */
  .food-section{background:var(--bg2);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px}
  .food-title{font-size:var(--fs-title);font-weight:500;color:var(--text);margin-bottom:10px}
  .food-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .food-btn{padding:12px 6px;border-radius:var(--radius-sm);border:none;background:var(--bg3);color:var(--text);font-size:var(--fs-btn);font-weight:500;text-align:center;cursor:pointer;text-decoration:none;display:block;line-height:1.33}
  .food-btn:active{opacity:.7}
  .food-btn.logged{color:#2ba870;background:rgba(43,168,112,.15)}
  .food-btn span{display:flex;justify-content:center;margin-bottom:5px;color:var(--sub)}
  .food-btn.logged span{color:inherit}

  /* Steps */
  .steps-section{background:var(--bg2);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px}
  .steps-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .steps-title{font-size:var(--fs-title);font-weight:500;color:var(--text)}
  .steps-val{font-size:var(--fs-major);font-weight:500;color:#2ba870}
  .steps-input-wrap{display:flex;gap:8px;align-items:center}
  .steps-input{flex:1;background:var(--bg3);border:none;border-radius:var(--radius-sm);color:var(--text);font-size:var(--fs-major);padding:10px 12px;font-family:var(--font)}
  .steps-input:focus{outline:none;box-shadow:0 0 0 1px rgba(255,255,255,.15)}
  .steps-save{padding:10px 16px;border-radius:100px;border:none;background:#2ba870;color:#0f0f0f;font-size:var(--fs-btn);font-weight:500}
  .steps-health{padding:10px 14px;border-radius:100px;border:none;background:var(--bg4);color:var(--text);font-size:var(--fs-btn);font-weight:500;white-space:nowrap;flex-shrink:0}
  .steps-health:active{opacity:.75}
  .steps-bar{height:4px;background:var(--bg3);border-radius:100px;overflow:hidden;margin-top:10px}
  .steps-fill{height:4px;background:#2ba870;border-radius:100px;transition:width .4s}

  /* Dashboard */
  .dash-section{margin-bottom:16px}
  .dash-title{font-size:var(--fs-major);font-weight:500;color:var(--text);margin-bottom:12px}
  .rings-wrap{display:flex;justify-content:center;margin-bottom:20px}
  .ring-legend{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
  .ring-leg-row{display:flex;align-items:center;gap:10px}
  .ring-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .ring-leg-label{font-size:var(--fs-title);color:var(--text);flex:1;font-weight:400}
  .ring-leg-val{font-size:var(--fs-major);font-weight:500}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr 1fr;gap:4px;margin-bottom:20px}
  .dash-day-col{text-align:center}
  .dash-day-lbl{font-size:var(--fs-sub);color:var(--sub);margin-bottom:6px}
  .dash-ring-mini{margin:0 auto 4px}

  /* Monthly history */
  .stats-tabs{display:flex;gap:8px;margin-bottom:16px}
  .stats-tab{flex:1;padding:9px 8px;border-radius:100px;border:none;background:var(--bg2);color:var(--sub);font-size:var(--fs-btn);font-weight:500}
  .stats-tab.active{background:var(--text);color:var(--bg)}
  .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .month-arrow{width:36px;height:36px;border-radius:50%;border:none;background:var(--bg2);color:var(--text);font-size:var(--fs-major);display:flex;align-items:center;justify-content:center}
  .month-arrow:disabled{opacity:.3}
  .month-label{font-size:var(--fs-major);font-weight:500;color:var(--text)}
  .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .sum-card{background:var(--bg2);border-radius:var(--radius-lg);padding:16px;border:none}
  .sum-val{font-size:var(--fs-major);font-weight:500}
  .sum-lbl{font-size:var(--fs-sub);color:var(--sub);margin-top:2px;font-weight:400}
  .sum-sub{font-size:var(--fs-sub);color:var(--sub);margin-top:4px;font-weight:400}
  .cal-wrap{background:var(--bg2);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
  .cal-dow div{text-align:center;font-size:var(--fs-sub);color:var(--sub)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-cell{aspect-ratio:1;border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:var(--fs-title);cursor:pointer;border:none;background:var(--bg3);position:relative}
  .cal-cell.sel{background:var(--bg4);font-weight:500}
  .cal-cell.empty{background:transparent!important;cursor:default}
  .cal-dots{display:flex;gap:2px;height:5px;margin-top:2px}
  .cal-dot{width:4px;height:4px;border-radius:50%}
  .cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .cat-name{font-size:var(--fs-title);width:66px;flex-shrink:0;color:var(--text);font-weight:400}
  .cat-track{flex:1;height:8px;background:var(--bg3);border-radius:100px;overflow:hidden}
  .cat-fill{height:8px;border-radius:100px;transition:width .4s}
  .cat-val{font-size:var(--fs-sub);color:var(--sub);width:48px;text-align:right;flex-shrink:0}
  .cat-sub{font-size:var(--fs-sub);color:var(--sub);margin:-6px 0 10px 76px}
  .trend-block{margin-bottom:16px}
  .trend-head{display:flex;justify-content:space-between;margin-bottom:6px}
  .trend-name{font-size:var(--fs-title);color:var(--text)}
  .trend-avg{font-size:var(--fs-sub);color:var(--sub)}
  .trend-bars{display:flex;gap:2px;align-items:flex-end;height:44px}
  .tb{flex:1;background:var(--bg3);border-radius:2px;display:flex;align-items:flex-end;overflow:hidden;min-width:2px}
  .tb-fill{width:100%;border-radius:2px;transition:height .3s}
  .day-detail{background:var(--bg2);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;border:none}
  .day-detail-title{font-size:var(--fs-major);font-weight:500;margin-bottom:12px;color:var(--text)}

  /* To-dos / reminders */
  .cal-wrap.plan .cal-cell{background:var(--bg3)}
  .cal-wrap.plan .cal-cell.empty{background:transparent!important}
  .cal-wrap.plan .cal-cell.today{box-shadow:inset 0 0 0 2px #3ea6ff;font-weight:500}
  .cal-todo-badge{position:absolute;top:3px;right:3px;min-width:14px;height:14px;padding:0 3px;border-radius:7px;background:#3ea6ff;color:#0f0f0f;font-size:var(--fs-sub);font-weight:600;display:flex;align-items:center;justify-content:center;line-height:1}
  .todo-card{background:var(--bg2);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;border:none}
  .todo-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px}
  .todo-card-head-left{display:flex;align-items:center;gap:8px;min-width:0}
  .todo-card-title{font-size:var(--fs-major);font-weight:500;color:var(--text);display:inline-flex;align-items:center;gap:7px}
  .todo-count{font-size:var(--fs-title);color:var(--sub);background:var(--bg3);padding:2px 9px;border-radius:100px;flex-shrink:0;font-weight:400}
  .todo-add{display:flex;gap:7px;margin-bottom:10px}
  .todo-input{flex:1;min-width:0;background:var(--bg3);border:none;border-radius:var(--radius-sm);color:var(--text);font-size:var(--fs-major);padding:10px 12px;font-family:var(--font)}
  .todo-input:focus{outline:none;box-shadow:0 0 0 1px rgba(255,255,255,.15)}
  .todo-time{background:var(--bg3);border:none;border-radius:var(--radius-sm);color:var(--text);font-size:var(--fs-major);padding:10px 8px;font-family:var(--font);width:auto;flex-shrink:0}
  .todo-add-btn{flex-shrink:0;width:36px;height:36px;border-radius:10px;border:none;background:#3ea6ff;color:#0f0f0f;display:inline-flex;align-items:center;justify-content:center}
  .todo-add-btn:active{opacity:.8}
  .todo-list{margin-top:6px}
  .todo-item{display:flex;align-items:center;gap:10px;padding:10px 2px;border-top:1px solid var(--border)}
  .todo-item:first-child{border-top:none}
  .todo-chk{cursor:pointer;margin-top:0}
  .todo-text{flex:1;font-size:var(--fs-major);color:var(--text);line-height:1.4;word-break:break-word}
  .todo-text.done{text-decoration:line-through;color:var(--sub)}

function dayStatsFromState(dayObj,st){
  const ds=(st&&st[dayObj.name])||{};let done=0,total=0;const tags={};
  dayObj.blocks.forEach((b,i)=>{const raw=ds[i];const tt=b.tasks.length;let dn=0;for(let j=0;j<tt;j++){if(raw&&(raw[j]||raw[String(j)]))dn++;}done+=dn;total+=tt;if(!tags[b.tag])tags[b.tag]={d:0,t:0};tags[b.tag].d+=dn;tags[b.tag].t+=tt;});
  return {done,total,tags};
}
function weekDayIndexForKey(k){
  const p=k.split("-").map(Number);
  const d=new Date(p[0],p[1]-1,p[2]);d.setHours(12,0,0,0);
  const mon=weekIdToDate(getWeekId());mon.setHours(12,0,0,0);
  const diff=Math.round((d-mon)/86400000);
  return (diff>=0&&diff<7)?diff:-1;
}
function tasksForDate(k){

function syncBlockNotifications(){

function streakOf(qualify){
  let s=0;const d=new Date();d.setHours(0,0,0,0);
  if(!qualify(dateKey(d)))d.setDate(d.getDate()-1);
  while(qualify(dateKey(d))){s++;d.setDate(d.getDate()-1);if(s>2000)break;}
  return s;
}
function bestStreak(qualify,lookback=400){
  let best=0,cur=0;const d=new Date();d.setHours(0,0,0,0);
  for(let i=0;i<lookback;i++){if(qualify(dateKey(d))){cur++;if(cur>best)best=cur;}else cur=0;d.setDate(d.getDate()-1);}
  return best;
}

function ringsSVG(rings,size=180,stroke=14,gap=6){
  const cx=size/2,cy=size/2;
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
  rings.forEach((r,i)=>{
    const rad=cx-(stroke/2)-(i*(stroke+gap));
    const circ=2*Math.PI*rad;
    const dash=circ*(r.pct/100);
    svg+=`<circle cx="${cx}" cy="${cy}" r="${rad}" fill="none" stroke="${r.trackColor}" stroke-width="${stroke}"/>`;
    svg+=`<circle cx="${cx}" cy="${cy}" r="${rad}" fill="none" stroke="${r.color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray .5s"/>`;
  });
  svg+=`</svg>`;
  return svg;
}

    const dt=new Date(md.year,md.month,d.day),future=dt>today;
    const pct=d.tasks&&d.tasks.total?Math.round(d.tasks.done/d.tasks.total*100):0;
    const bg=pct>0?`rgba(62,166,255,${(0.12+0.5*pct/100).toFixed(2)})`:"var(--bg3)";
    const tcol=pct>=45?"#fff":"var(--text)";
    const dots=[d.water>=WATER_GOAL?`<div class="cal-dot" style="background:#378ADD"></div>`:"",d.steps>=STEPS_GOAL?`<div class="cal-dot" style="background:#1D9E75"></div>`:"",d.meals>=3?`<div class="cal-dot" style="background:#D4537E"></div>`:""].join("");
    html+=`<div class="cal-cell${selMonthKey===d.key?" sel":""}" style="background:${bg};opacity:${future?.4:1};color:${tcol}" onclick="selMonthKey='${d.key}';render()">${d.day}<div class="cal-dots">${dots}</div></div>`;
  });
  html+=`</div></div>`;

  if(selMonthKey){
    const dd=md.days.find(x=>x.key===selMonthKey);
    if(dd){
      const p=selMonthKey.split("-").map(Number);
      const lbl=new Date(p[0],p[1]-1,p[2]).toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});
      html+=`<div class="day-detail"><div class="day-detail-title">${lbl}</div>
        <div class="cat-row"><div class="cat-name">Water</div><div class="cat-track"><div class="cat-fill" style="width:${Math.min(100,dd.water/WATER_GOAL*100)}%;background:#378ADD"></div></div><div class="cat-val">${dd.water}L</div></div>
        <div class="cat-row"><div class="cat-name">Steps</div><div class="cat-track"><div class="cat-fill" style="width:${Math.min(100,dd.steps/STEPS_GOAL*100)}%;background:#1D9E75"></div></div><div class="cat-val">${dd.steps.toLocaleString()}</div></div>
        <div class="cat-row"><div class="cat-name">Meals</div><div class="cat-track"><div class="cat-fill" style="width:${Math.min(100,dd.meals/3*100)}%;background:#D4537E"></div></div><div class="cat-val">${dd.meals}/3</div></div>
        <div class="cat-row"><div class="cat-name">Tasks</div><div class="cat-track"><div class="cat-fill" style="width:${dd.tasks&&dd.tasks.total?Math.round(dd.tasks.done/dd.tasks.total*100):0}%;background:#3ea6ff"></div></div><div class="cat-val">${dd.tasks?dd.tasks.done+"/"+dd.tasks.total:"—"}</div></div>
      </div>`;
    }
  }

  const wDays=md.days.filter(d=>d.water>0);
  if(wDays.length)catAgg["Water"]={d:wDays.filter(d=>d.water>=WATER_GOAL).length,t:wDays.length,kind:"tracker",color:"#378ADD",label:"days at 2.5L"};
  const sDays=md.days.filter(d=>d.steps>0);
  if(sDays.length)catAgg["Steps"]={d:sDays.filter(d=>d.steps>=STEPS_GOAL).length,t:sDays.length,kind:"tracker",color:"#1D9E75",label:"days at 8k"};
  const mDays=md.days.filter(d=>d.meals>0);
  if(mDays.length)catAgg["Meals"]={d:md.days.filter(d=>d.meals>=3).length,t:mDays.length,kind:"tracker",color:"#D4537E",label:"days all 3 logged"};
  const scrDays=md.days.filter(d=>d.screen!==null);
  if(scrDays.length)catAgg["Doomscroll"]={d:scrDays.filter(d=>d.screen<=SCREEN_LIMIT).length,t:scrDays.length,kind:"tracker",color:"#B07FE0",label:"days under limit"};
  const allCats=Object.keys(catAgg).sort((a,b)=>{
    const pa=catAgg[a].t?catAgg[a].d/catAgg[a].t:0,pb=catAgg[b].t?catAgg[b].d/catAgg[b].t:0;
    if(catAgg[a].kind==="tracker"&&catAgg[b].kind!=="tracker")return 1;
    if(catAgg[b].kind==="tracker"&&catAgg[a].kind!=="tracker")return -1;
    return pb-pa;
  });
  if(allCats.length){
    html+=`<div class="dash-title">By category</div>`;
    allCats.forEach(tag=>{
      const v=catAgg[tag],p=v.t?Math.round(v.d/v.t*100):0;
      const col=v.color||TAGS[tag]||"#888";
      const sub=v.kind==="tracker"?`${v.d}/${v.t} ${v.label}`:`${v.d}/${v.t} tasks`;
      html+=`<div class="cat-row"><div class="cat-name">${tag}</div><div class="cat-track"><div class="cat-fill" style="width:${p}%;background:${col}"></div></div><div class="cat-val">${p}%</div></div><div class="cat-sub">${sub}</div>`;
    });
  } else {
    html+=`<div style="font-size:var(--fs-sub);color:var(--sub);text-align:center;padding:14px 0">No task history yet for this month — it builds as you check things off.</div>`;
  }

  html+=`<div class="dash-title" style="margin-top:20px">Daily trends</div>`;
  html+=`<div class="trend-block"><div class="trend-head"><div class="trend-name">Task completion</div><div class="trend-avg">${taskPct}% avg</div></div>${barChart(md.days.map(d=>d.tasks&&d.tasks.total?Math.round(d.tasks.done/d.tasks.total*100):0),100,"#3ea6ff")}</div>`;
  html+=`<div class="trend-block"><div class="trend-head"><div class="trend-name">Water (L)</div><div class="trend-avg">goal 2.5L</div></div>${barChart(md.days.map(d=>d.water),WATER_GOAL,"#378ADD")}</div>`;
  html+=`<div class="trend-block"><div class="trend-head"><div class="trend-name">Steps</div><div class="trend-avg">goal 8k</div></div>${barChart(md.days.map(d=>d.steps),STEPS_GOAL,"#1D9E75")}</div>`;
  html+=`<div class="trend-block"><div class="trend-head"><div class="trend-name">Doomscroll (min)</div><div class="trend-avg">limit ${SCREEN_LIMIT}m · red = over</div></div>${barChartC(md.days.map(d=>d.screen||0),Math.max(SCREEN_LIMIT*2,...md.days.map(d=>d.screen||0)),v=>v>SCREEN_LIMIT?"#D85A30":"#B07FE0")}</div>`;
  return html;
}

// ---- To-do UI builders ----
function todoAddHTML(key){
  return `<div class="todo-add">
    <input id="todoInput" class="todo-input" type="text" placeholder="Add a task or reminder…" value="${esc(todoText)}" oninput="todoText=this.value" onkeydown="if(event.key==='Enter'){submitTodo('${key}')}"/>
    <input class="todo-time" type="time" value="${todoTime}" oninput="todoTime=this.value" title="Optional time"/>
    <button class="todo-add-btn" onclick="submitTodo('${key}')" aria-label="Add">${ic('plus',18)}</button>
  </div>`;
}
function todoListHTML(key,isToday){
  const arr=sortTodos(getTodos(key));
  if(!arr.length)return `<div class="todo-empty">${todoAddOpen?"":"Nothing here yet — tap + to add a task."}</div>`;
  const cur=nowHM();
  return arr.map(it=>{
    const overdue=isToday&&it.time&&!it.done&&it.time<cur;
    return `<div class="todo-item${it.done?" done":""}${overdue?" overdue":""}">
      <div class="chk todo-chk" style="border-color:${it.done?"#3ea6ff":"var(--sub)"};background:${it.done?"#3ea6ff":"transparent"}" onclick="toggleTodo('${key}','${it.id}')">${it.done?ic('check',13):""}</div>
      <div class="todo-text${it.done?" done":""}">${esc(it.text)}</div>
      ${it.time?`<span class="todo-time-badge">${ic('clock',11)} ${fmt12(it.time)}</span>`:""}
      <button class="todo-del" onclick="deleteTodo('${key}','${it.id}')" aria-label="Delete">${ic('trash',15)}</button>
    </div>`;
  }).join("");
}
function todoCardHTML(){
  const key=todayKey(),open=getTodos(key).filter(x=>!x.done).length;
  return `<div class="todo-card">
    <div class="todo-card-head">
      <div class="todo-card-head-left"><div class="todo-card-title">${ic('list',16)} Today's to-dos</div>${open?`<span class="todo-count">${open} left</span>`:""}</div>
      ${!todoAddOpen?`<button class="todo-add-btn" onclick="todoAddOpen=true;render()" aria-label="Add task">${ic('plus',18)}</button>`:""}
    </div>
    ${todoAddOpen?todoAddHTML(key):""}
    <div class="todo-list">${todoListHTML(key,true)}</div>
  </div>`;
}
function weekPlanHTML(){
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const mi=calMonthInfo(calMonthOffset),all=loadTodosAll(),tdk=todayKey();
  const lead=(mi.first.getDay()===0?6:mi.first.getDay()-1);
  let html=`<div class="month-nav">
    <button class="month-arrow" onclick="calMonthOffset--;render()">‹</button>
    <div class="month-label">${MONTHS[mi.month]} ${mi.year}</div>
    <button class="month-arrow" onclick="calMonthOffset++;render()">›</button>
  </div>`;
  html+=`<div class="cal-wrap plan"><div class="cal-dow">${["M","T","W","T","F","S","S"].map(x=>`<div>${x}</div>`).join("")}</div><div class="cal-grid">`;
  for(let i=0;i<lead;i++)html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=mi.days;d++){
    const key=`${mi.year}-${mi.month+1}-${d}`,items=all[key]||[],openN=items.filter(x=>!x.done).length;
    html+=`<div class="cal-cell${key===calSelKey?" sel":""}${key===tdk?" today":""}" onclick="calSelKey='${key}';render()">${d}${openN?`<span class="cal-todo-badge">${openN}</span>`:""}</div>`;
  }
  html+=`</div></div>`;
  const selKey=calSelKey||tdk,p=selKey.split("-").map(Number);
  const lbl=new Date(p[0],p[1]-1,p[2]).toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"}),isToday=selKey===tdk;
  html+=`<div class="todo-card">
    <div class="todo-card-head"><div class="todo-card-title">${ic('calendar',15)} ${lbl}${isToday?" · Today":""}</div></div>
    ${todoAddHTML(selKey)}
    <div class="todo-list">${todoListHTML(selKey,isToday)}</div>
  </div>`;
  const tIdx=todayIdx();
  html+=`<div class="dash-title" style="margin-top:8px;margin-bottom:6px">This week at a glance</div>
    <div style="font-size:var(--fs-sub);color:var(--sub);margin-bottom:12px">Tap a day to open its schedule.</div>`;
  DAYS.forEach((d,i)=>{
    const{done,total}=getDayStats(d.name,d.blocks),pc=Math.round(done/total*100);
    html+=`<div class="week-row${i===tIdx?" today":""}" onclick="activeDayIdx=${i};view='day';render()">
      <div class="week-day" style="color:${i===tIdx?"#3ea6ff":"var(--text)"}">${d.short}</div>
      <div class="week-meta"><div class="week-theme">${d.theme}</div><div class="week-bar"><div class="week-fill" style="width:${pc}%;background:${d.tc}"></div></div></div>
      <div class="week-count">${done}/${total}</div>
    </div>`;
  });
  return html;
}

      const col=C[b.tag]||C.Life;

    day.blocks.forEach((b,bi)=>{

      b.tasks.forEach((_,j)=>{if(state[day.name][bi][j]===undefined)state[day.name][bi][j]=false;});

      const tasks=state[day.name][bi];

          <div class="block-time">${fmtH(b.st)}</div>
          <div class="block-name" style="color:${isCurrent?col.color:"var(--text)"}">${b.name}${b.fixed?`<span class="fixed-badge">fixed</span>`:""}</div>
          <span class="tag-pill" style="background:var(--bg4);color:var(--text)">${b.tag}</span>
          ${done>0?`<span class="block-prog">${done}/${b.tasks.length}</span>`:""}
          <span class="chevron${isOpen?" open":""}">${ic('chevron',16)}</span>

          ${b.meals&&b.meals.length?foodHTML(b.meals):""}
          ${b.tasks.map((t,ti)=>`<div class="task-row${canEditDay?"":" locked"}"${canEditDay?` onclick="toggle('${day.name}',${bi},${ti})"`:""}>
            <div class="chk" style="border-color:${tasks[ti]?"#3ea6ff":"var(--border)"};background:${tasks[ti]?"#3ea6ff":"transparent"}">${tasks[ti]?ic('check',13):""}</div>
            <div class="task-text${tasks[ti]?" done":""}">${t}</div>

          ${b.note?`<div class="block-note">${b.note}</div>`:""}
          ${!b.fixed&&canEditDay?`<button class="start-timer-btn" style="background:${col.color}" onclick="startTimer('${b.name}','${col.color}')">${ic('timer',14)} Pomodoro for ADHD! Lock-in 25 minutes</button>`:""}
        </div>`:""}
      </div>`;
    });
  }

  // JOURNAL VIEW
  if(view==="journal"){
    html+=journalHTML();
    html+=moodGraphHTML(monthData(0).days);
  }

  // MONTH VIEW (calendar planner + week glance)
  if(view==="month"){
    html+=weekPlanHTML();
  }

  html+=`</div>`;

  const DINIT=["M","T","W","T","F","S","S"];
  html+=`<div class="bottom-nav">
    <div class="day-strip">${DAYS.map((d,i)=>`<button class="dbtn${i===tIdx?" today":""}${i===activeDayIdx?" active":""}" onclick="activeDayIdx=${i};view='day';render()">${DINIT[i]}</button>`).join("")}</div>
    <div class="tab-bar">
      <button class="tab-btn${view==="now"?" active":""}" onclick="view='now';render()">${ic('play',20)}Now</button>
      <button class="tab-btn${view==="day"?" active":""}" onclick="view='day';render()">${ic('list',20)}Day</button>
      <button class="tab-btn${view==="journal"?" active":""}" onclick="view='journal';render()">${ic('notebook',20)}Journal</button>
      <button class="tab-btn${view==="month"?" active":""}" onclick="view='month';render()">${ic('calendar',20)}Month</button>
      <button class="tab-btn${view==="dash"?" active":""}" onclick="view='dash';render()">${ic('chart',20)}Stats</button>
    </div>
  </div>`;

  document.getElementById("app").innerHTML=html;
  renderTimer();

  if(HEALTH_NATIVE&&!healthSyncBooted){healthSyncBooted=true;setTimeout(()=>syncHealthSteps(true),500);}
}

// Swipe sideways to move between views
(function(){
  const app=document.getElementById("app");
  if(!app)return;
  let x0=null,y0=null,t0=0;
  app.addEventListener("touchstart",e=>{
    if(e.touches.length!==1){x0=null;return;}
    const t=e.touches[0];x0=t.clientX;y0=t.clientY;t0=Date.now();
  },{passive:true});
  app.addEventListener("touchend",e=>{
    if(x0===null)return;
    const t=e.changedTouches[0],dx=t.clientX-x0,dy=t.clientY-y0;
    x0=null;
    if(Date.now()-t0>600)return;
    if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.4)return;
    if(e.target&&e.target.closest&&e.target.closest("input,textarea,select"))return;
    const i=VIEWS.indexOf(view);if(i<0)return;
    if(dx<0&&i<VIEWS.length-1){view=VIEWS[i+1];render();}
    else if(dx>0&&i>0){view=VIEWS[i-1];render();}
  },{passive:true});
})();

if(SYNC_ON){
  syncFromRemote();
  setInterval(syncFromRemote,20000);
  document.addEventListener("visibilitychange",()=>{if(!document.hidden)syncFromRemote();});
}
</script>
