<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Life OS"/>
<meta name="theme-color" content="#FBF1FB"/>
<title>Life OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #FBF1FB; --bg2: #FFFFFF; --bg3: #F4EBFB;
    --border: #F0E2F3; --text: #5A4E63; --sub: #B09BC0;
    --accent: #C9A7E8; --accent-soft: #F3E9FB;
    --radius: 22px;
    --shadow: 0 6px 18px rgba(180, 140, 210, 0.12);
    --shadow-sm: 0 3px 10px rgba(180, 140, 210, 0.10);
    --font: "Quicksand", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); font-weight: 500; background: linear-gradient(180deg, #FBF1FB 0%, #F3F0FD 100%); background-attachment: fixed; color: var(--text); min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom); }
  button { font-family: var(--font); font-weight: 600; cursor: pointer; }

  /* Header */
  .header { position: sticky; top: 0; background: rgba(251, 241, 251, 0.82); backdrop-filter: saturate(140%) blur(12px); -webkit-backdrop-filter: saturate(140%) blur(12px); z-index: 50; padding: 12px 16px 0; border-bottom: 1.5px solid var(--border); padding-top: max(12px, env(safe-area-inset-top)); }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .app-title { font-size: 19px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
  .header-meta { font-size: 12px; color: var(--sub); margin-top: 2px; font-weight: 600; }
  .header-stats { text-align: right; }
  .stat-big { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--sub); font-weight: 600; }
  .progress-bar { height: 8px; background: var(--bg3); border-radius: 100px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 8px; background: linear-gradient(90deg, #E8A7D4, #C9A7E8); border-radius: 100px; transition: width .4s; }

  /* Day nav */
  .day-nav { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-btn { padding: 7px 15px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--bg2); color: var(--sub); font-size: 13px; font-weight: 600; white-space: nowrap; flex-shrink: 0; transition: all .18s; box-shadow: var(--shadow-sm); }
  .day-btn.today { border-color: var(--accent); color: var(--accent); }
  .day-btn.active { background: linear-gradient(135deg, #E8A7D4, #C9A7E8); color: #fff; border-color: transparent; }
  .day-btn.today.active { background: linear-gradient(135deg, #E8A7D4, #C9A7E8); color: #fff; border-color: transparent; }

  /* View toggle */
  .view-toggle { display: flex; gap: 6px; padding: 0 16px 12px; margin-top: 6px; }
  .view-btn { padding: 7px 16px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--bg2); color: var(--sub); font-size: 12px; font-weight: 600; box-shadow: var(--shadow-sm); transition: all .18s; }
  .view-btn.active { background: linear-gradient(135deg, #E8A7D4, #C9A7E8); color: #fff; border-color: transparent; }

  /* Content */
  .content { padding: 16px; }

  /* Timer */
  .timer-card { border-radius: var(--radius); padding: 18px; margin-bottom: 14px; border: 2px solid; background: var(--bg2); box-shadow: var(--shadow); }
  .timer-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .timer-label { font-size: 13px; color: var(--sub); font-weight: 600; }
  .timer-controls { display: flex; gap: 6px; }
  .timer-btn { font-size: 12px; padding: 6px 12px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--bg3); color: var(--text); font-weight: 600; }
  .timer-display { font-size: 46px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .timer-bar { height: 8px; background: var(--bg3); border-radius: 100px; overflow: hidden; margin-top: 10px; }
  .timer-fill { height: 8px; border-radius: 100px; transition: width 1s linear; }
  .timer-note { font-size: 12px; color: var(--sub); margin-top: 8px; font-weight: 600; }

  /* Now card */
  .now-card { border-radius: var(--radius); padding: 20px; margin-bottom: 12px; border: 2px solid; box-shadow: var(--shadow); }
  .now-label { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; opacity: .7; margin-bottom: 6px; }
  .now-name { font-size: 23px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.01em; }
  .now-note { font-size: 13px; opacity: .8; margin-bottom: 14px; line-height: 1.6; font-weight: 500; }
  .task-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border-radius: 14px; cursor: pointer; margin-bottom: 5px; transition: transform .12s; }
  .task-row:active { transform: scale(0.98); opacity: .8; }
  .chk { width: 22px; height: 22px; border-radius: 8px; border: 2px solid; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; transition: all .15s; }
  .task-text { font-size: 14px; line-height: 1.5; font-weight: 500; }
  .task-text.done { text-decoration: line-through; opacity: .4; }
  .start-timer-btn { margin-top: 14px; font-size: 13px; padding: 11px 20px; border-radius: 100px; border: none; color: #fff; font-weight: 700; box-shadow: var(--shadow-sm); }

  /* Next block */
  .next-block { background: var(--bg2); border-radius: 18px; padding: 13px 16px; border: 1.5px solid var(--border); margin-bottom: 12px; box-shadow: var(--shadow-sm); }
  .next-label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; font-weight: 700; }
  .next-name { font-size: 14px; font-weight: 600; }

  /* Block card (day view) */
  .block-card { border-radius: var(--radius); border: 1.5px solid var(--border); margin-bottom: 10px; overflow: hidden; transition: opacity .2s; background: var(--bg2); box-shadow: var(--shadow-sm); }
  .block-card.current { border-width: 2px; }
  .block-card.past { opacity: .5; }
  .block-head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; }
  .block-time { font-size: 11px; color: var(--sub); width: 68px; flex-shrink: 0; font-weight: 600; }
  .block-name { flex: 1; font-size: 14px; font-weight: 600; }
  .tag-pill { font-size: 10px; padding: 3px 10px; border-radius: 100px; font-weight: 700; flex-shrink: 0; }
  .block-prog { font-size: 11px; color: var(--sub); margin-left: 2px; font-weight: 600; }
  .chevron { font-size: 14px; color: var(--sub); transition: transform .2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }
  .block-body { border-top: 1.5px solid var(--border); padding: 12px 16px 16px; display: none; }
  .block-body.open { display: block; }
  .block-note { font-size: 12px; color: var(--sub); margin-top: 10px; padding: 10px 12px; background: var(--bg3); border-radius: 14px; line-height: 1.6; font-style: italic; font-weight: 500; }
  .fixed-badge { font-size: 10px; color: var(--sub); padding: 2px 8px; border-radius: 100px; background: var(--bg3); margin-left: 6px; font-weight: 600; }
  .mini-timer-btn { margin-top: 10px; font-size: 12px; padding: 8px 16px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--bg3); color: var(--text); font-weight: 600; }

  /* Week view */
  .week-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: var(--radius); border: 1.5px solid var(--border); margin-bottom: 10px; cursor: pointer; background: var(--bg2); box-shadow: var(--shadow-sm); }
  .week-row.today { border-color: var(--accent); }
  .week-day { font-size: 13px; font-weight: 700; width: 32px; flex-shrink: 0; }
  .week-meta { flex: 1; min-width: 0; }
  .week-theme { font-size: 13px; font-weight: 600; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .week-bar { height: 6px; background: var(--bg3); border-radius: 100px; overflow: hidden; }
  .week-fill { height: 6px; border-radius: 100px; }
  .week-count { font-size: 12px; color: var(--sub); flex-shrink: 0; font-weight: 600; }

  /* Rescue */
  .rescue-toggle { width: 100%; margin-top: 14px; padding: 13px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--bg2); color: var(--accent); font-size: 13px; font-weight: 700; box-shadow: var(--shadow-sm); }
  .rescue-panel { margin-top: 10px; background: var(--bg2); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .rescue-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
  .rescue-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .rescue-item { padding: 12px 14px; border-radius: 16px; border: 1.5px solid var(--border); background: var(--accent-soft); cursor: pointer; transition: transform .12s; }
  .rescue-item:active { transform: scale(0.97); opacity: .8; }
  .rescue-item b { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .rescue-item span { font-size: 11px; color: var(--sub); font-weight: 500; }

  /* Day header */
  .day-header { margin-bottom: 14px; }
  .day-title-big { font-size: 18px; font-weight: 700; color: var(--text); }
  .day-intent { font-size: 13px; color: var(--sub); margin-top: 6px; line-height: 1.6; font-weight: 500; }
  .theme-pill { display: inline-block; font-size: 12px; padding: 4px 12px; border-radius: 100px; font-weight: 700; margin-top: 6px; }

  /* Install banner */
  .install-banner { margin: 0 16px 12px; background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; border: 1.5px solid var(--accent); display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-sm); }
  .install-text { flex: 1; font-size: 12px; color: var(--sub); line-height: 1.5; font-weight: 500; }
  .install-text b { color: var(--text); }
  .install-close { font-size: 16px; color: var(--sub); background: none; border: none; padding: 4px; }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #221B2B; --bg2: #2E2538; --bg3: #3A2F47;
      --border: #3F3450; --text: #EFE6F5; --sub: #A593B8;
      --accent: #D8B6F0; --accent-soft: #3A2F47;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      --shadow-sm: 0 3px 10px rgba(0, 0, 0, 0.20);
    }
    body { background: linear-gradient(180deg, #221B2B 0%, #1E1A2B 100%); }
    .header { background: rgba(34, 27, 43, 0.82); }
  }
</style>
</head>

<script>

  move_cook:  {st:t(18,30),en:t(19,30), name:"Move + cook dinner",   tag:"Health", fixed:false, tasks:["Home workout 30 min (YouTube) OR walk 3,000–4,000 steps","Shower if you worked out","Change into comfy clothes — cooking mode on"], note:"Movement first, then cooking as your decompression. This is the good part of the day."},
  cook_tue:   {st:t(19,30),en:t(20,30), name:"Cook a proper meal",   tag:"Health", fixed:false, tasks:["Pull up a saved IG reel or recipe you've been wanting to try","Cook something real — you're eating it tonight + lunch tomorrow","Track macros while you eat","No screens during eating if you can manage it"], note:"Cooking is your creative decompression tonight. It doesn't have to be complicated — just intentional."},

const SM={st:t(19),en:t(19,30),name:"Eat + wind into evening",tag:"Health",fixed:false,tasks:["Eat dinner — something from today's prep or simple","Track macros","You've done a full day's work — the evening is yours"],note:""};

const UC={st:t(9),en:t(11,30),name:"CSCI — long session",tag:"CSCI",fixed:false,tasks:["Triage first — what's due this week?","Do the highest-priority item first","If caught up: get one week ahead"],note:"Sunday + Saturday CSCI = 4.5 hrs dedicated + 75 min daily morning touches. You will not fall behind."};

const DAYS=[
  {name:"Monday",   short:"Mon",theme:"Job hunt night",       tc:"#7F77DD",tb:"#EEEDFE",intent:"Big application block tonight. One focus, done well. Reheat tonight — cooking starts Tuesday.",               blocks:[B.wake,B.ritual,B.hygiene,B.bfast,B.precsci,B.leave,B.commute_to,B.ibm,B.commute_home,B.change,B.move_dinner,B.apps_big,B.tirth,B.wind]},
  {name:"Tuesday",  short:"Tue",theme:"DSA + cook night",     tc:"#888780",tb:"#F1EFE8",intent:"DSA first while brain is sharpest, then cook a proper meal as your decompression. CSCI touch before bed.",        blocks:[B.wake,B.ritual,B.hygiene,B.bfast,B.precsci,B.leave,B.commute_to,B.ibm,B.commute_home,B.change,B.move_cook,B.cook_tue,B.dsa,B.csci_touch,B.apps_med,B.wind]},
  {name:"Wednesday",short:"Wed",theme:"CSCI + cook night",    tc:"#888780",tb:"#F1EFE8",intent:"Cook night again — different recipe, leftovers for Thursday lunch. CSCI full session after.",                      blocks:[B.wake,B.ritual,B.hygiene,B.bfast,B.precsci,B.leave,B.commute_to,B.ibm,B.commute_home,B.change,B.move_cook,B.cook_wed,B.csci_long,B.upskill,B.apps_med,B.wind]},
  {name:"Thursday", short:"Thu",theme:"Job apps + CSCI night",tc:"#7F77DD",tb:"#EEEDFE",intent:"Applications first while evening energy is highest, then CSCI touch. Reheating tonight — Wednesday leftovers.",   blocks:[B.wake,B.ritual,B.hygiene,B.bfast,B.precsci,B.leave,B.commute_to,B.ibm,B.commute_home,B.change,B.move_dinner,B.apps_big,B.csci_touch,B.tirth_long,B.wind]},
  {name:"Friday",   short:"Fri",theme:"Content + rest night", tc:"#BA7517",tb:"#FAEEDA",intent:"Content creation works Friday — you're more yourself when the week's pressure lifts. Reheat or order tonight.",    blocks:[B.wake,B.ritual,B.hygiene,B.bfast,B.precsci,B.leave,B.commute_to,B.ibm,B.commute_home,B.change,FRI_D,B.content,B.apps_med,FRI_F,B.wind]},
  {name:"Saturday", short:"Sat",theme:"Deep work + groceries",tc:"#7F77DD",tb:"#EEEDFE",intent:"No IBM. Jobs, CSCI, grocery run, meal prep, workout — then the evening is actually yours.",                        blocks:[SW,SB,SJ,SG,SL,SC,SP,SW2,SM,SLI,B.wind]},
  {name:"Sunday",   short:"Sun",theme:"Reset day",            tc:"#D4537E",tb:"#FBEAF0",intent:"Not catch-up — reset. CSCI, planning, light prep, and early rest so Monday-you starts strong.",                    blocks:[UW,UC,UL,UR,UA,URest,UM,UE,UWind]},
];

const STORAGE_KEY = "life_os_v3";
function loadState(){
  try{ const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); }catch(e){}
  const s={};
  DAYS.forEach(d=>{s[d.name]={};d.blocks.forEach((b,i)=>{s[d.name][i]=b.tasks.map(()=>false);});});
  return s;
}
function saveState(s){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(s)); }catch(e){} }

// ---- STATE ----
let state = loadState();
let activeDayIdx = (()=>{ const d=new Date().getDay(); return d===0?6:d-1; })();
let view = "now"; // now | day | week
let timerSec = 0, timerTotal = 0, timerLabel = "", timerColor = "#7F77DD", timerRunning = false, timerInterval = null;
let openBlocks = {};
let showRescue = false;
let showInstall = !localStorage.getItem("install_dismissed");

function todayIdx(){ const d=new Date().getDay(); return d===0?6:d-1; }
function nowH(){ return new Date().getHours()+new Date().getMinutes()/60; }
function fmtClock(){ const n=new Date(); let h=n.getHours(),m=n.getMinutes(),ap=h>=12?"PM":"AM"; h=h%12||12; return `${h}:${String(m).padStart(2,"0")} ${ap}`; }

function getDayStats(dayName, blocks){
  const s=state[dayName]||{};
  let done=0,total=0;
  blocks.forEach((b,i)=>{ (s[i]||[]).forEach(v=>{ total++; if(v) done++; }); });
  return {done,total};
}

function startTimer(label, color, mins=25){
  if(timerInterval) clearInterval(timerInterval);
  timerSec=mins*60; timerTotal=mins*60; timerLabel=label; timerColor=color; timerRunning=true;
  timerInterval=setInterval(()=>{
    if(!timerRunning) return;
    timerSec--;
    if(timerSec<=0){ timerSec=0; timerRunning=false; clearInterval(timerInterval); }
    renderTimer();
  },1000);
  render();
}
function stopTimer(){ clearInterval(timerInterval); timerSec=0; timerRunning=false; render(); }
function pauseTimer(){ timerRunning=!timerRunning; renderTimer(); }

function toggle(dayName, bi, ti){
  if(!state[dayName]) state[dayName]={};
  if(!state[dayName][bi]) state[dayName][bi]=DAYS.find(d=>d.name===dayName).blocks[bi].tasks.map(()=>false);
  state[dayName][bi][ti]=!state[dayName][bi][ti];
  saveState(state);
  render();
}

function renderTimer(){
  const el=document.getElementById("timer-widget");
  if(!el) return;
  if(timerSec<=0 && !timerRunning){ el.style.display="none"; return; }
  el.style.display="block";
  el.style.borderColor=timerColor;
  el.querySelector(".timer-label").textContent=timerLabel;
  el.querySelector(".timer-display").textContent=`${Math.floor(timerSec/60)}:${String(timerSec%60).padStart(2,"0")}`;
  el.querySelector(".timer-fill").style.width=(timerSec/timerTotal*100)+"%";
  el.querySelector(".timer-fill").style.background=timerColor;
  el.querySelector(".pause-btn").textContent=timerRunning?"Pause":"Resume";
}

function render(){
  const day = DAYS[activeDayIdx];
  const now = nowH();
  const {done,total} = getDayStats(day.name, day.blocks);
  const pct = Math.round(done/total*100);
  const tIdx = todayIdx();
  const curBlockIdx = day.blocks.findIndex(b=>now>=b.st&&now<b.en);

  let html = `
  <div class="header">
    <div class="header-row">
      <div>
        <div class="app-title">Life OS ૮ ˶ᵔ ᵕ ᵔ˶ ྀིა</div>
        <div class="header-meta">${day.name} · <span id="clk">${fmtClock()}</span></div>
      </div>
      <div class="header-stats">
        <div class="stat-big">${done}/${total}</div>
        <div class="stat-label">tasks done</div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="day-nav">
      ${DAYS.map((d,i)=>`<button class="day-btn${i===tIdx?" today":""}${i===activeDayIdx?" active":""}" onclick="activeDayIdx=${i};view='day';render()">${d.short}</button>`).join("")}
    </div>
    <div class="view-toggle">
      <button class="view-btn${view==="now"?" active":""}" onclick="view='now';render()">▶ Now</button>
      <button class="view-btn${view==="day"?" active":""}" onclick="view='day';render()">📋 Day</button>
      <button class="view-btn${view==="week"?" active":""}" onclick="view='week';render()">📅 Week</button>
    </div>
  </div>`;

  // Install banner
  if(showInstall){
    html+=`<div class="install-banner">
      <div class="install-text"><b>Add to Home Screen</b> — tap Share in Safari, then "Add to Home Screen" to use this as an app.</div>
      <button class="install-close" onclick="showInstall=false;localStorage.setItem('install_dismissed','1');this.closest('.install-banner').remove()">✕</button>
    </div>`;
  }

  html+=`<div class="content">`;

  // Timer widget
  html+=`<div id="timer-widget" class="timer-card" style="display:${timerSec>0?"block":"none"};border-color:${timerColor}">
    <div class="timer-top">
      <div class="timer-label">${timerLabel}</div>
      <div class="timer-controls">
        <button class="timer-btn pause-btn" onclick="pauseTimer()">${timerRunning?"Pause":"Resume"}</button>
        <button class="timer-btn" onclick="stopTimer()">Stop</button>
      </div>
    </div>
    <div class="timer-display">${Math.floor(timerSec/60)}:${String(timerSec%60).padStart(2,"0")}</div>
    <div class="timer-bar"><div class="timer-fill" style="width:${timerSec/timerTotal*100}%;background:${timerColor}"></div></div>
    <div class="timer-note">Phone down. You're already doing it.</div>
  </div>`;

  // NOW VIEW
  if(view==="now"){
    if(curBlockIdx>=0){
      const b=day.blocks[curBlockIdx];
      const col=C[b.tag];
      const tasks=(state[day.name]||{})[curBlockIdx]||b.tasks.map(()=>false);
      html+=`<div class="now-card" style="border-color:${col.color};background:${col.bg}">
        <div class="now-label" style="color:${col.tc}">Do this now · ${fmtH(b.st)}–${fmtH(b.en)}</div>
        <div class="now-name" style="color:${col.tc}">${b.name}</div>
        ${b.note?`<div class="now-note" style="color:${col.tc}">${b.note}</div>`:""}
        <div>
          ${b.tasks.map((t,ti)=>`
          <div class="task-row" onclick="toggle('${day.name}',${curBlockIdx},${ti})" style="background:rgba(0,0,0,0.06)">
            <div class="chk" style="border-color:${tasks[ti]?col.color:col.tc};background:${tasks[ti]?col.color:"transparent"}">${tasks[ti]?"✓":""}</div>
            <div class="task-text${tasks[ti]?" done":""}" style="color:${col.tc}">${t}</div>
          </div>`).join("")}
        </div>
        ${!b.fixed?`<button class="start-timer-btn" style="background:${col.color}" onclick="startTimer('${b.name}','${col.color}')">▶ Start 25-min timer</button>`:""}
      </div>`;

      // Next block
      if(curBlockIdx<day.blocks.length-1){
        const nb=day.blocks[curBlockIdx+1];
        const nc=C[nb.tag];
        html+=`<div class="next-block">
          <div class="next-label">Up next · ${fmtH(nb.st)}</div>
          <div class="next-name" style="color:${nc.color}">${nb.name} <span class="tag-pill" style="background:${nc.bg};color:${nc.tc}">${nb.tag}</span></div>
        </div>`;
      }
    } else {
      html+=`<div style="background:var(--bg2);border-radius:12px;padding:20px;text-align:center;color:var(--sub);font-size:14px;border:0.5px solid var(--border)">No scheduled block right now.<br><span style="font-size:12px">Check the Day view for your full schedule.</span></div>`;
    }

    // Rescue
    html+=`<button class="rescue-toggle" onclick="showRescue=!showRescue;render()">😵 Overwhelmed? Open rescue mode</button>`;
    if(showRescue){
      const rescues=[["Ground first","5 breaths + water. Nothing else yet."],["Tiniest job task","Open resume. Change one word. Done."],["Eat something","Doesn't have to be perfect. Just eat."],["Move","Stand up. Walk around. 2 minutes."],["Text Tirth","One kind thing. That's all."],["Reset screen","Close everything. One tab only."]];
      html+=`<div class="rescue-panel">
        <div class="rescue-title">Pick just one tiny thing</div>
        <div class="rescue-grid">
          ${rescues.map(([t,s])=>`<div class="rescue-item" onclick="showRescue=false;render()"><b>${t}</b><span>${s}</span></div>`).join("")}
        </div>
      </div>`;
    }
  }

  // DAY VIEW
  if(view==="day"){
    html+=`<div class="day-header">
      <div class="day-title-big">${day.name}</div>
      <span class="theme-pill" style="background:${day.tb};color:${day.tc}">${day.theme}</span>
      <div class="day-intent">${day.intent}</div>
    </div>`;
    day.blocks.forEach((b,bi)=>{
      const col=C[b.tag];
      const tasks=(state[day.name]||{})[bi]||b.tasks.map(()=>false);
      const done=tasks.filter(Boolean).length;
      const isCurrent=bi===curBlockIdx;
      const isPast=now>=b.en;
      const isOpen=openBlocks[`${activeDayIdx}-${bi}`]||isCurrent;
      html+=`<div class="block-card${isCurrent?" current":""}${isPast?" past":""}" style="${isCurrent?`border-color:${col.color}`:""}" id="bc-${bi}">
        <div class="block-head" onclick="openBlocks['${activeDayIdx}-${bi}']=!openBlocks['${activeDayIdx}-${bi}'];render()">
          <div class="block-time">${fmtH(b.st)}</div>
          <div class="block-name" style="color:${isCurrent?col.color:"var(--text)"}">
            ${b.name}${b.fixed?`<span class="fixed-badge">fixed</span>`:""}
          </div>
          <span class="tag-pill" style="background:${col.bg};color:${col.tc}">${b.tag}</span>
          ${done>0?`<span class="block-prog">${done}/${b.tasks.length}</span>`:""}
          <span class="chevron${isOpen?" open":""}">⌄</span>
        </div>
        ${isOpen?`<div class="block-body open">
          ${b.tasks.map((t,ti)=>`
          <div class="task-row" onclick="toggle('${day.name}',${bi},${ti})">
            <div class="chk" style="border-color:${tasks[ti]?"var(--accent)":"var(--border)"};background:${tasks[ti]?"var(--accent)":"transparent"}">${tasks[ti]?"✓":""}</div>
            <div class="task-text${tasks[ti]?" done":""}">${t}</div>
          </div>`).join("")}
          ${b.note?`<div class="block-note">${b.note}</div>`:""}
          ${!b.fixed?`<button class="mini-timer-btn" onclick="startTimer('${b.name}','${col.color}')">▶ 25-min timer</button>`:""}
        </div>`:""}
      </div>`;
    });
  }

  // WEEK VIEW
  if(view==="week"){
    html+=`<div style="font-size:13px;color:var(--sub);margin-bottom:12px">Your week at a glance — tap to switch days.</div>`;
    DAYS.forEach((d,i)=>{
      const {done,total}=getDayStats(d.name,d.blocks);
      const p=Math.round(done/total*100);
      html+=`<div class="week-row${i===tIdx?" today":""}" onclick="activeDayIdx=${i};view='day';render()">
        <div class="week-day" style="color:${i===tIdx?"var(--accent)":"var(--text)"}">${d.short}</div>
        <div class="week-meta">
          <div class="week-theme">${d.theme}</div>
          <div class="week-bar"><div class="week-fill" style="width:${p}%;background:${d.tc}"></div></div>
        </div>
        <div class="week-count">${done}/${total}</div>
      </div>`;
    });
  }

  html+=`</div>`;
  document.getElementById("app").innerHTML=html;
  renderTimer();
}

// Clock tick
setInterval(()=>{ const el=document.getElementById("clk"); if(el) el.textContent=fmtClock(); },1000);

render();
</script>
</body>
</html>
