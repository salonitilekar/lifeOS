<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Life OS"/>
<meta name="theme-color" content="#0f0f0f"/>
<title>Life OS</title>
<style>
  :root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:#2e2e2e;--text:#f0f0f0;--sub:#888;--radius:12px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}
  button{font-family:var(--font);cursor:pointer}
  .header{position:sticky;top:0;background:var(--bg);z-index:50;padding:12px 16px 0;border-bottom:0.5px solid var(--border);padding-top:max(12px,env(safe-area-inset-top))}
  .header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .app-title{font-size:18px;font-weight:600;color:var(--text)}
  .header-meta{font-size:12px;color:var(--sub);margin-top:2px}
  .header-stats{text-align:right}
  .stat-big{font-size:22px;font-weight:600;color:var(--text)}
  .stat-label{font-size:11px;color:var(--sub)}
  .progress-bar{height:3px;background:var(--bg3);border-radius:100px;overflow:hidden;margin-bottom:10px}
  .progress-fill{height:3px;background:#7F77DD;border-radius:100px;transition:width .4s}
  .day-nav{display:flex;gap:4px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
  .day-nav::-webkit-scrollbar{display:none}
  .day-btn{padding:5px 13px;border-radius:100px;border:1px solid var(--border);background:var(--bg2);color:var(--sub);font-size:13px;white-space:nowrap;flex-shrink:0;transition:all .15s}
  .day-btn.today{border-color:#7F77DD;color:#7F77DD}
  .day-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .day-btn.today.active{background:#7F77DD;color:#fff;border-color:#7F77DD}
  .view-toggle{display:flex;gap:4px;padding:0 16px 10px;margin-top:6px}
  .view-btn{padding:5px 14px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--sub);font-size:12px}
  .view-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .content{padding:14px 16px}
  .timer-card{border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1.5px solid}
  .timer-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .timer-label{font-size:13px;color:var(--sub)}
  .timer-controls{display:flex;gap:6px}
  .timer-btn{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text)}
  .timer-display{font-size:44px;font-weight:600;font-variant-numeric:tabular-nums}
  .timer-bar{height:4px;background:var(--bg3);border-radius:100px;overflow:hidden;margin-top:10px}
  .timer-fill{height:4px;border-radius:100px;transition:width 1s linear}
  .timer-note{font-size:12px;color:var(--sub);margin-top:8px}
  .now-card{border-radius:14px;padding:18px;margin-bottom:12px;border:1.5px solid}
  .now-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-bottom:6px}
  .now-name{font-size:22px;font-weight:600;margin-bottom:6px}
  .now-note{font-size:13px;opacity:.75;margin-bottom:14px;line-height:1.6}
  .task-row{display:flex;align-items:flex-start;gap:10px;padding:8px;border-radius:8px;cursor:pointer;margin-bottom:4px}
  .task-row:active{opacity:.7}
  .chk{width:18px;height:18px;border-radius:5px;border:1.5px solid;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all .15s}
  .task-text{font-size:14px;line-height:1.5}
  .task-text.done{text-decoration:line-through;opacity:.4}
  .start-timer-btn{margin-top:14px;font-size:13px;padding:9px 18px;border-radius:10px;border:none;color:#fff;font-weight:500}
  .next-block{background:var(--bg2);border-radius:10px;padding:12px 14px;border:0.5px solid var(--border);margin-bottom:12px}
  .next-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .next-name{font-size:14px;font-weight:500}
  .block-card{border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:8px;overflow:hidden;transition:opacity .2s}
  .block-card.current{border-width:1.5px}
  .block-card.past{opacity:.4}
  .block-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
  .block-time{font-size:11px;color:var(--sub);width:68px;flex-shrink:0}
  .block-name{flex:1;font-size:14px;font-weight:500}
  .tag-pill{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:500;flex-shrink:0}
  .block-prog{font-size:11px;color:var(--sub);margin-left:2px}
  .chevron{font-size:14px;color:var(--sub);transition:transform .2s;flex-shrink:0}
  .chevron.open{transform:rotate(180deg)}
  .block-body{border-top:0.5px solid var(--border);padding:10px 14px 14px;display:none}
  .block-body.open{display:block}
  .block-note{font-size:12px;color:var(--sub);margin-top:10px;padding:8px 10px;background:var(--bg3);border-radius:8px;line-height:1.6;font-style:italic}
  .fixed-badge{font-size:10px;color:var(--sub);padding:2px 6px;border-radius:4px;background:var(--bg3);margin-left:6px;font-weight:400}
  .mini-timer-btn{margin-top:10px;font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text)}
  .week-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:8px;cursor:pointer}
  .week-row.today{border-color:#7F77DD}
  .week-day{font-size:13px;font-weight:500;width:32px;flex-shrink:0}
  .week-meta{flex:1;min-width:0}
  .week-theme{font-size:13px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .week-bar{height:3px;background:var(--bg3);border-radius:100px;overflow:hidden}
  .week-fill{height:3px;border-radius:100px}
  .week-count{font-size:12px;color:var(--sub);flex-shrink:0}
  .rescue-toggle{width:100%;margin-top:14px;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--sub);font-size:13px}
  .rescue-panel{margin-top:10px;background:var(--bg2);border-radius:var(--radius);padding:14px}
  .rescue-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px}
  .rescue-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .rescue-item{padding:10px 12px;border-radius:10px;border:0.5px solid var(--border);background:var(--bg);cursor:pointer}
  .rescue-item:active{opacity:.7}
  .rescue-item b{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
  .rescue-item span{font-size:11px;color:var(--sub)}
  .install-banner{margin:0 16px 12px;background:var(--bg2);border-radius:var(--radius);padding:12px 14px;border:1px solid #7F77DD44;display:flex;align-items:center;gap:10px}
  .install-text{flex:1;font-size:12px;color:var(--sub);line-height:1.5}
  .install-text b{color:var(--text)}
  .install-close{font-size:16px;color:var(--sub);background:none;border:none;padding:4px}

  /* Water tracker */
  .water-section{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .water-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .water-title{font-size:14px;font-weight:500;color:var(--text)}
  .water-val{font-size:20px;font-weight:600;color:#378ADD}
  .water-goal-txt{font-size:11px;color:var(--sub)}
  .water-slider-wrap{position:relative;padding:8px 0}
  .water-track{display:flex;justify-content:space-between;align-items:center;position:relative}
  .water-track::before{content:'';position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:4px;background:var(--bg3);border-radius:100px;z-index:0}
  .water-fill-bar{position:absolute;left:0;top:50%;transform:translateY(-50%);height:4px;background:#378ADD;border-radius:100px;z-index:1;transition:width .3s}
  .water-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:var(--bg3);cursor:pointer;z-index:2;position:relative;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .water-dot.active{background:#378ADD;border-color:#378ADD;transform:scale(1.2)}
  .water-dot.filled{background:#378ADD;border-color:#378ADD}
  .water-labels{display:flex;justify-content:space-between;margin-top:6px}
  .water-lbl{font-size:9px;color:var(--sub);text-align:center;width:20px}

  /* Food log */
  .food-section{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .food-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px}
  .food-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .food-btn{padding:10px 6px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;font-weight:500;text-align:center;cursor:pointer;text-decoration:none;display:block;line-height:1.4}
  .food-btn:active{opacity:.7}
  .food-btn.logged{border-color:#1D9E75;color:#1D9E75;background:rgba(29,158,117,0.08)}
  .food-btn span{display:block;font-size:18px;margin-bottom:4px}

  /* Steps */
  .steps-section{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .steps-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .steps-title{font-size:14px;font-weight:500;color:var(--text)}
  .steps-val{font-size:20px;font-weight:600;color:#1D9E75}
  .steps-input-wrap{display:flex;gap:8px;align-items:center}
  .steps-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;padding:8px 12px;font-family:var(--font)}
  .steps-save{padding:8px 16px;border-radius:8px;border:none;background:#1D9E75;color:#fff;font-size:13px;font-weight:500}
  .steps-bar{height:4px;background:var(--bg3);border-radius:100px;overflow:hidden;margin-top:10px}
  .steps-fill{height:4px;background:#1D9E75;border-radius:100px;transition:width .4s}

  /* Dashboard */
  .dash-section{margin-bottom:20px}
  .dash-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:14px}
  .rings-wrap{display:flex;justify-content:center;margin-bottom:20px}
  .ring-legend{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
  .ring-leg-row{display:flex;align-items:center;gap:10px}
  .ring-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .ring-leg-label{font-size:13px;color:var(--text);flex:1}
  .ring-leg-val{font-size:13px;font-weight:500}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr 1fr;gap:4px;margin-bottom:20px}
  .dash-day-col{text-align:center}
  .dash-day-lbl{font-size:10px;color:var(--sub);margin-bottom:6px}
  .dash-ring-mini{margin:0 auto 4px}

  /* Monthly history */
  .stats-tabs{display:flex;gap:6px;margin-bottom:16px}
  .stats-tab{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--sub);font-size:13px;font-weight:500}
  .stats-tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .month-arrow{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center}
  .month-arrow:disabled{opacity:.3}
  .month-label{font-size:15px;font-weight:600;color:var(--text)}
  .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
  .sum-card{background:var(--bg2);border-radius:var(--radius);padding:14px;border:0.5px solid var(--border)}
  .sum-val{font-size:22px;font-weight:600}
  .sum-lbl{font-size:11px;color:var(--sub);margin-top:2px}
  .sum-sub{font-size:10px;color:var(--sub);margin-top:4px}
  .cal-wrap{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:20px}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
  .cal-dow div{text-align:center;font-size:10px;color:var(--sub)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:1.5px solid transparent;position:relative}
  .cal-cell.sel{border-color:var(--text)}
  .cal-cell.empty{background:transparent!important;cursor:default}
  .cal-dots{display:flex;gap:2px;height:5px;margin-top:2px}
  .cal-dot{width:4px;height:4px;border-radius:50%}
  .cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .cat-name{font-size:12px;width:66px;flex-shrink:0;color:var(--text)}
  .cat-track{flex:1;height:8px;background:var(--bg3);border-radius:100px;overflow:hidden}
  .cat-fill{height:8px;border-radius:100px;transition:width .4s}
  .cat-val{font-size:11px;color:var(--sub);width:48px;text-align:right;flex-shrink:0}
  .trend-block{margin-bottom:16px}
  .trend-head{display:flex;justify-content:space-between;margin-bottom:6px}
  .trend-name{font-size:12px;color:var(--text)}
  .trend-avg{font-size:11px;color:var(--sub)}
  .trend-bars{display:flex;gap:2px;align-items:flex-end;height:44px}
  .tb{flex:1;background:var(--bg3);border-radius:2px;display:flex;align-items:flex-end;overflow:hidden;min-width:2px}
  .tb-fill{width:100%;border-radius:2px;transition:height .3s}
  .day-detail{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:20px;border:0.5px solid var(--border)}
  .day-detail-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text)}

  /* Screentime + pomodoro */
  .screen-section{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .pomo-wrap{display:flex;flex-direction:column;gap:5px;margin-top:14px}
  .pomo-wrap .start-timer-btn,.pomo-wrap .mini-timer-btn{margin-top:0}
  .pomo-tag{font-size:11px;font-weight:500;opacity:.85}

  /* Streak + medals */
  .streak-card{background:linear-gradient(135deg,rgba(255,140,40,.14),rgba(127,119,221,.14)),var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .streak-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .streak-flame{font-size:42px;line-height:1;filter:drop-shadow(0 0 10px rgba(255,140,40,.5))}
  .streak-num{font-size:36px;font-weight:700;line-height:1;color:var(--text)}
  .streak-unit{font-size:14px;font-weight:500;color:var(--sub);margin-left:6px}
  .streak-lbl{font-size:12px;color:var(--sub);margin-top:5px}
  .streak-chips{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
  .streak-chip{background:var(--bg3);border-radius:12px;padding:9px 4px;text-align:center}
  .streak-chip span{font-size:15px;display:block}
  .streak-chip b{font-size:17px;font-weight:700;display:block;margin-top:2px;color:var(--text)}
  .streak-chip i{font-size:9px;color:var(--sub);font-style:normal;display:block;margin-top:1px}
  .medal-row{display:flex;justify-content:space-between;gap:4px;margin-bottom:12px}
  .medal{flex:1;text-align:center}
  .medal-ico{font-size:25px;line-height:1.2}
  .medal-n{font-size:9px;color:var(--sub)}
  .medal.locked .medal-ico{filter:grayscale(1);opacity:.35}
  .medal-next-track{height:6px;background:var(--bg3);border-radius:100px;overflow:hidden;margin-bottom:6px}
  .medal-next-fill{height:6px;background:linear-gradient(90deg,#ff8c28,#ffd23f);border-radius:100px;transition:width .4s}
  .medal-next-lbl{font-size:11px;color:var(--sub)}

  @media(prefers-color-scheme:light){
    :root{--bg:#f5f5f5;--bg2:#fff;--bg3:#ebebeb;--border:#ddd;--text:#111;--sub:#777}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
const FORM_BASE="https://docs.google.com/forms/d/e/1FAIpQLSfXgIXoRuEOnSimgAsG9awg--qBIYriCFinVSM8KJj_wbx0yw/viewform?usp=pp_url&entry.1213268056=";
const WATER_LEVELS=[0,0.5,0.75,1,1.25,1.5,1.75,2,2.25,2.5];
const WATER_GOAL=2.5;
const STEPS_GOAL=8000;
const SCREEN_LIMIT=60; // doomscroll minutes/day — staying under is the win

// ---- Supabase sync (fill these in to enable cross-device sync) ----
const SUPABASE_URL="https://dwuiheikbxkegqwcdymn.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_WLnDOaHYRhjEPA9l95--UA_a_RW8COH";
const SYNC_ON=!!(SUPABASE_URL&&SUPABASE_ANON_KEY);
const REST=`${SUPABASE_URL}/rest/v1/lifeos_data`;
const SB_HEADERS={apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`,"Content-Type":"application/json"};

const t=(h,m=0)=>h+m/60;
const fmtH=h=>{const hh=Math.floor(h)%12||12,mm=Math.round((h%1)*60),ap=h>=12&&h<24?"pm":"am";return `${hh}${mm?":"+String(mm).padStart(2,"0"):""}${ap}`;};

const B={
  wake:      {st:t(5),    en:t(5,10),  name:"Wake up",              tag:"Body",   fixed:false,meals:[],tasks:["Sit up immediately — don't lie back down","Drink the glass of water on your nightstand","Lights on. Bright light ends sleep inertia."],note:"Don't negotiate in bed. Sit up first, feel awake second."},
  ritual:    {st:t(5,10), en:t(5,40),  name:"Morning ritual",       tag:"Spirit", fixed:false,meals:[],tasks:["Isha Kriya — 15 min (before phone, before anything)","Lamp diya + mala jaap","This is yours before the day begins."],note:"Do this before checking your phone. One Instagram scroll ruins the ritual."},
  hygiene:   {st:t(5,40), en:t(6,15),  name:"Shower + get ready",   tag:"Body",   fixed:false,meals:[],tasks:["Brush teeth — 2 min, set a timer","Shower — full wash on hair days, quick rinse otherwise","Skincare: cleanser → moisturiser → SPF","Get dressed — clothes laid out the night before"],note:"Hygiene scheduled = hygiene that actually happens."},
  bfast:     {st:t(6,15), en:t(7),     name:"Breakfast + meds",     tag:"Health", fixed:false,meals:["Breakfast"],tasks:["Take thyroid meds first — empty stomach","Use the 30-min wait to pack your bag and lunch","Eat breakfast — protein first, track macros"],note:"Thyroid meds on empty stomach affects your whole day's hormone levels."},
  precsci:   {st:t(7),    en:t(8,15),  name:"Morning CSCI block",   tag:"CSCI",   fixed:false,meals:[],tasks:["One problem, one reading, or review yesterday's notes","75 min of quiet before the world wakes up","No job apps here — too fragmented"],note:"Your 5am start gives you a 3-hour head start. This is it."},
  leave:     {st:t(8,15), en:t(8,20),  name:"Leave for IBM",        tag:"IBM",    fixed:true, meals:[],tasks:["Bag packed (done last night)","Lunch packed","Out the door by 8:20 — not 8:22"],note:""},
  commute_to:{st:t(8,20), en:t(9),     name:"Commute to IBM",       tag:"IBM",    fixed:true, meals:[],tasks:["Headphones in — podcast, Brij Kishore, or tech audio","No doom scrolling — learning or music only","One thing to accomplish at IBM today?"],note:"40 min × 5 days = 3.5 hrs/week of free learning."},
  ibm:       {st:t(9),    en:t(17,30), name:"IBM — full day",       tag:"IBM",    fixed:true, meals:["Lunch"],tasks:["Show up fully — this is referral territory","Build rapport with one teammate this week","Lunch: eat what you packed, step outside 10 min","Note one thing you built or learned today"],note:"IBM colleagues are potential full-time referrals. Your internship is part of your visa strategy."},
  commute_home:{st:t(17,30),en:t(18,15),name:"Commute home",        tag:"Life",   fixed:true, meals:[],tasks:["Walk part of commute if possible — steps count","Listen to something enjoyable — not work","Mentally close the IBM day before you walk in"],note:"Without this mental close, IBM stress bleeds into every evening."},

const SK="life_os_v3",WK="life_os_week",WATER_K="life_os_water",STEPS_K="life_os_steps",MEALS_K="life_os_meals",ARCH_K="life_os_archive",SCREEN_K="life_os_screen";

function todayKey(){const n=new Date();return `${n.getFullYear()}-${n.getMonth()+1}-${n.getDate()}`;}
function dateKey(d){return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function weekIdToDate(w){const p=w.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function getWeekId(){const now=new Date(),day=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));return `${mon.getFullYear()}-${mon.getMonth()+1}-${mon.getDate()}`;}
function freshState(){const s={};DAYS.forEach(d=>{s[d.name]={};d.blocks.forEach((b,i)=>{s[d.name][i]=b.tasks.map(()=>false);});});return s;}
function loadState(){
  try{
    const sw=localStorage.getItem(WK),cw=getWeekId();
    if(sw!==cw){
      if(sw){try{const old=JSON.parse(localStorage.getItem(SK)||"null");if(old)archiveStateFor(sw,old);}catch(e){}}
      localStorage.setItem(WK,cw);const s=freshState();localStorage.setItem(SK,JSON.stringify(s));return s;
    }
    const r=localStorage.getItem(SK);if(r)return JSON.parse(r);
  }catch(e){}return freshState();
}
function saveState(s){try{localStorage.setItem(SK,JSON.stringify(s));pushRemote("state",s);archiveStateFor(getWeekId(),s);}catch(e){}}
function loadWater(){try{const r=localStorage.getItem(WATER_K);if(r){const d=JSON.parse(r);return d[todayKey()]||0;}}catch(e){}return 0;}
function saveWater(v){try{const d=JSON.parse(localStorage.getItem(WATER_K)||"{}");d[todayKey()]=v;localStorage.setItem(WATER_K,JSON.stringify(d));pushRemote("water",d);}catch(e){}}
function loadSteps(){try{const r=localStorage.getItem(STEPS_K);if(r){const d=JSON.parse(r);return d[todayKey()]||0;}}catch(e){}return 0;}
function saveSteps(v){try{const d=JSON.parse(localStorage.getItem(STEPS_K)||"{}");d[todayKey()]=v;localStorage.setItem(STEPS_K,JSON.stringify(d));pushRemote("steps",d);}catch(e){}}
function loadScreen(){try{const r=localStorage.getItem(SCREEN_K);if(r){const d=JSON.parse(r);return d[todayKey()]||0;}}catch(e){}return 0;}
function saveScreen(v){try{const d=JSON.parse(localStorage.getItem(SCREEN_K)||"{}");d[todayKey()]=v;localStorage.setItem(SCREEN_K,JSON.stringify(d));pushRemote("screen",d);}catch(e){}}
function loadScreenAll(){try{const r=localStorage.getItem(SCREEN_K);if(r)return JSON.parse(r);}catch(e){}return {};}
function loadMealsLog(){try{const r=localStorage.getItem(MEALS_K);if(r)return JSON.parse(r);}catch(e){}return {};}
function getLoggedMeals(key){const d=loadMealsLog();return d[key]||[];}
function logMeal(m){try{const d=loadMealsLog(),k=todayKey(),arr=d[k]||[];if(!arr.includes(m))arr.push(m);d[k]=arr;localStorage.setItem(MEALS_K,JSON.stringify(d));pushRemote("meals",d);}catch(e){}render();}
function loadWeekData(){
  const water={},steps={};
  try{const w=localStorage.getItem(WATER_K);if(w)Object.assign(water,JSON.parse(w));}catch(e){}
  try{const s=localStorage.getItem(STEPS_K);if(s)Object.assign(steps,JSON.parse(s));}catch(e){}
  return {water,steps};
}

// ---- Date-wise task/category archive ----
function dayStatsFromState(dayObj,st){
  const ds=(st&&st[dayObj.name])||{};let done=0,total=0;const tags={};
  dayObj.blocks.forEach((b,i)=>{const arr=ds[i]||[];const tt=b.tasks.length;let dn=0;for(let j=0;j<tt;j++){if(arr[j])dn++;}done+=dn;total+=tt;if(!tags[b.tag])tags[b.tag]={d:0,t:0};tags[b.tag].d+=dn;tags[b.tag].t+=tt;});
  return {done,total,tags};
}
function loadArchive(){try{const r=localStorage.getItem(ARCH_K);if(r)return JSON.parse(r);}catch(e){}return {};}
function archiveStateFor(weekId,st){try{const mon=weekIdToDate(weekId),a=loadArchive();for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);a[dateKey(d)]=dayStatsFromState(DAYS[i],st);}localStorage.setItem(ARCH_K,JSON.stringify(a));pushRemote("archive",a);}catch(e){}}

// ---- Cloud sync helpers ----
async function sbGetAll(){const res=await fetch(`${REST}?select=key,value`,{headers:SB_HEADERS});if(!res.ok)throw new Error("sb "+res.status);return res.json();}
async function sbUpsert(key,value){await fetch(REST,{method:"POST",headers:{...SB_HEADERS,Prefer:"resolution=merge-duplicates"},body:JSON.stringify({key,value})});}
function pushRemote(key,value){if(SYNC_ON)sbUpsert(key,value).catch(()=>{});}
async function syncFromRemote(){
  if(!SYNC_ON)return;
  try{
    const rows=await sbGetAll(),map={};
    rows.forEach(r=>map[r.key]=r.value);
    const cw=getWeekId();
    if(map.archive)localStorage.setItem(ARCH_K,JSON.stringify(map.archive));
    if(map.week===cw&&map.state){localStorage.setItem(WK,cw);localStorage.setItem(SK,JSON.stringify(map.state));state=map.state;}
    else{
      if(map.week&&map.state)archiveStateFor(map.week,map.state);
      const fresh=freshState();localStorage.setItem(WK,cw);localStorage.setItem(SK,JSON.stringify(fresh));state=fresh;pushRemote("week",cw);pushRemote("state",fresh);
    }
    if(map.water)localStorage.setItem(WATER_K,JSON.stringify(map.water));
    if(map.steps)localStorage.setItem(STEPS_K,JSON.stringify(map.steps));
    if(map.meals)localStorage.setItem(MEALS_K,JSON.stringify(map.meals));
    if(map.screen)localStorage.setItem(SCREEN_K,JSON.stringify(map.screen));
    archiveStateFor(cw,state);
    waterLevel=loadWater();stepsVal=loadSteps();screenVal=loadScreen();
    render();
  }catch(e){}
}

function startTimer(label,color,mins=25){
  if(timerInterval)clearInterval(timerInterval);
  timerSec=mins*60;timerTotal=mins*60;timerLabel=label;timerColor=color;timerRunning=true;
  timerInterval=setInterval(()=>{if(!timerRunning)return;timerSec--;if(timerSec<=0){timerSec=0;timerRunning=false;clearInterval(timerInterval);}renderTimer();},1000);
  render();
}
function stopTimer(){clearInterval(timerInterval);timerSec=0;timerRunning=false;render();}
function pauseTimer(){timerRunning=!timerRunning;renderTimer();}
function toggle(dayName,bi,ti){
  if(!state[dayName])state[dayName]={};
  if(!state[dayName][bi])state[dayName][bi]=DAYS.find(d=>d.name===dayName).blocks[bi].tasks.map(()=>false);
  state[dayName][bi][ti]=!state[dayName][bi][ti];saveState(state);render();
}
function setWater(idx){waterLevel=WATER_LEVELS[idx];saveWater(waterLevel);render();}
function saveStepsInput(){stepsVal=parseInt(stepsInput)||0;saveSteps(stepsVal);render();}
function saveScreenInput(){screenVal=parseInt(screenInput)||0;saveScreen(screenVal);render();}

function renderTimer(){
  const el=document.getElementById("timer-widget");if(!el)return;
  if(timerSec<=0&&!timerRunning){el.style.display="none";return;}
  el.style.display="block";el.style.borderColor=timerColor;
  el.querySelector(".timer-label").textContent=timerLabel;
  el.querySelector(".timer-display").textContent=`${Math.floor(timerSec/60)}:${String(timerSec%60).padStart(2,"0")}`;
  el.querySelector(".timer-fill").style.width=(timerSec/timerTotal*100)+"%";
  el.querySelector(".timer-fill").style.background=timerColor;
  el.querySelector(".pause-btn").textContent=timerRunning?"Pause":"Resume";
}

function streakOf(qualify){
  let s=0;const d=new Date();d.setHours(0,0,0,0);
  if(!qualify(dateKey(d)))d.setDate(d.getDate()-1);
  while(qualify(dateKey(d))){s++;d.setDate(d.getDate()-1);if(s>2000)break;}
  return s;
}
function bestStreak(qualify,lookback=400){
  let best=0,cur=0;const d=new Date();d.setHours(0,0,0,0);
  for(let i=0;i<lookback;i++){if(qualify(dateKey(d))){cur++;if(cur>best)best=cur;}else cur=0;d.setDate(d.getDate()-1);}
  return best;
}
const MEDALS=[{n:3,ico:"🥉",name:"Getting started"},{n:7,ico:"🥈",name:"One week"},{n:14,ico:"🥇",name:"Two weeks"},{n:30,ico:"🏆",name:"One month"},{n:60,ico:"💎",name:"Two months"},{n:100,ico:"👑",name:"Century"}];
function streakHTML(){
  const arch=loadArchive(),{water,steps}=loadWeekData(),meals=loadMealsLog(),screen=loadScreenAll();
  const active=k=>((water[k]||0)>0)||((steps[k]||0)>0)||((meals[k]||[]).length>0)||(k in screen)||(arch[k]&&arch[k].done>0);
  const waterG=k=>(water[k]||0)>=WATER_GOAL;
  const stepsG=k=>(steps[k]||0)>=STEPS_GOAL;
  const tasksG=k=>arch[k]&&arch[k].total&&(arch[k].done/arch[k].total)>=0.8;
  const lowScr=k=>(k in screen)&&screen[k]<=SCREEN_LIMIT;
  const streak=streakOf(active);
  const best=Math.max(bestStreak(active),streak);
  const isBest=streak>0&&streak>=best;
  const next=MEDALS.find(m=>m.n>streak);
  const chips=[["💧","Water",streakOf(waterG)],["👟","Steps",streakOf(stepsG)],["✅","Tasks",streakOf(tasksG)],["📵","Low screen",streakOf(lowScr)]];
  return `<div class="streak-card">
    <div class="streak-top">
      <div class="streak-flame">🔥</div>
      <div>
        <div class="streak-num">${streak}<span class="streak-unit">day${streak===1?"":"s"}</span></div>
        <div class="streak-lbl">${streak===0?"Log anything today to start a streak":isBest?"🌟 Personal best — keep it alive!":`Best: ${best} days`}</div>
      </div>
    </div>
    <div class="streak-chips">
      ${chips.map(([e,n,v])=>`<div class="streak-chip"><span>${e}</span><b>${v}</b><i>${n}</i></div>`).join("")}
    </div>
    <div class="medal-row">
      ${MEDALS.map(m=>{const earned=best>=m.n;return `<div class="medal${earned?"":" locked"}" title="${m.name} (${m.n} days)"><div class="medal-ico">${earned?m.ico:"🔒"}</div><div class="medal-n">${m.n}d</div></div>`;}).join("")}
    </div>
    ${next?`<div class="medal-next"><div class="medal-next-track"><div class="medal-next-fill" style="width:${Math.round(streak/next.n*100)}%"></div></div><div class="medal-next-lbl">${next.n-streak} day${next.n-streak===1?"":"s"} to ${next.ico} ${next.name}</div></div>`:`<div class="medal-next-lbl" style="text-align:center">👑 You've earned every medal. Legend.</div>`}
  </div>`;
}

function ringsSVG(rings,size=180,stroke=14,gap=6){
  const cx=size/2,cy=size/2;
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
  rings.forEach((r,i)=>{
    const rad=cx-(stroke/2)-(i*(stroke+gap));
    const circ=2*Math.PI*rad;
    const dash=circ*(r.pct/100);
    svg+=`<circle cx="${cx}" cy="${cy}" r="${rad}" fill="none" stroke="${r.trackColor}" stroke-width="${stroke}"/>`;
    svg+=`<circle cx="${cx}" cy="${cy}" r="${rad}" fill="none" stroke="${r.color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray .5s"/>`;
  });
  svg+=`</svg>`;
  return svg;
}

function monthData(offset){
  const base=new Date();base.setDate(1);base.setMonth(base.getMonth()+offset);
  const year=base.getFullYear(),month=base.getMonth();
  const first=new Date(year,month,1),last=new Date(year,month+1,0);
  const arch=loadArchive(),{water,steps}=loadWeekData(),meals=loadMealsLog(),screen=loadScreenAll();
  const days=[];
  for(let dn=1;dn<=last.getDate();dn++){const dt=new Date(year,month,dn),k=dateKey(dt);days.push({day:dn,key:k,water:water[k]||0,steps:steps[k]||0,meals:(meals[k]||[]).length,screen:(k in screen)?screen[k]:null,tasks:arch[k]||null});}
  return {year,month,first,last,days};
}
function barChart(values,max,color){
  return `<div class="trend-bars">${values.map(v=>{const h=max?Math.min(100,(v/max)*100):0;return `<div class="tb"><div class="tb-fill" style="height:${h}%;background:${color}"></div></div>`;}).join("")}</div>`;
}
function barChartC(values,max,colorFn){
  return `<div class="trend-bars">${values.map(v=>{const h=max?Math.min(100,(v/max)*100):0;return `<div class="tb"><div class="tb-fill" style="height:${h}%;background:${colorFn(v)}"></div></div>`;}).join("")}</div>`;
}
function monthHTML(){
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const md=monthData(monthOffset);
  const today=new Date();today.setHours(0,0,0,0);
  let wSum=0,wN=0,sSum=0,sN=0,tD=0,tT=0,mealCount=0,scrSum=0,scrN=0,activeDays=0;const catAgg={};
  md.days.forEach(d=>{
    if(d.water>0){wSum+=d.water;wN++;}
    if(d.steps>0){sSum+=d.steps;sN++;}
    if(d.screen!==null){scrSum+=d.screen;scrN++;}
    mealCount+=d.meals;

    if(d.tasks){tD+=d.tasks.done;tT+=d.tasks.total;Object.entries(d.tasks.tags||{}).forEach(([tag,v])=>{if(!catAgg[tag])catAgg[tag]={d:0,t:0};catAgg[tag].d+=v.d;catAgg[tag].t+=v.t;});}
  });
  const avgW=wN?wSum/wN:0,avgS=sN?Math.round(sSum/sN):0,taskPct=tT?Math.round(tD/tT*100):0,avgScr=scrN?Math.round(scrSum/scrN):0;

    if(curBlockIdx>=0){
      const b=day.blocks[curBlockIdx];
      const C={Spirit:{color:"#D4537E",bg:"#FBEAF0",tc:"#72243E"},Body:{color:"#5DCAA5",bg:"#E1F5EE",tc:"#085041"},Health:{color:"#D85A30",bg:"#FAECE7",tc:"#712B13"},IBM:{color:"#666",bg:"#F1EFE8",tc:"#333"},Career:{color:"#7F77DD",bg:"#EEEDFE",tc:"#3C3489"},Skills:{color:"#1D9E75",bg:"#E1F5EE",tc:"#085041"},CSCI:{color:"#888780",bg:"#F1EFE8",tc:"#444441"},Content:{color:"#BA7517",bg:"#FAEEDA",tc:"#633806"},Life:{color:"#378ADD",bg:"#E6F1FB",tc:"#0C447C"}};
      const col=C[b.tag]||C.Life;
      const tasks=(state[day.name]||{})[curBlockIdx]||b.tasks.map(()=>false);
      html+=foodHTML(b.meals);
      html+=`<div class="now-card" style="border-color:${col.color};background:${col.bg}">
        <div class="now-label" style="color:${col.tc}">Do this now · ${fmtH(b.st)}–${fmtH(b.en)}</div>
        <div class="now-name" style="color:${col.tc}">${b.name}</div>
        ${b.note?`<div class="now-note" style="color:${col.tc}">${b.note}</div>`:""}
        ${b.tasks.map((t,ti)=>`<div class="task-row" onclick="toggle('${day.name}',${curBlockIdx},${ti})" style="background:rgba(0,0,0,0.06)">
          <div class="chk" style="border-color:${tasks[ti]?col.color:col.tc};background:${tasks[ti]?col.color:"transparent"}">${tasks[ti]?"✓":""}</div>
          <div class="task-text${tasks[ti]?" done":""}" style="color:${col.tc}">${t}</div>
        </div>`).join("")}
        ${!b.fixed?`<div class="pomo-wrap"><button class="start-timer-btn" style="background:${col.color}" onclick="startTimer('${b.name}','${col.color}')">▶ Start 25-min timer</button><span class="pomo-tag" style="color:${col.tc}">🍅 Pomodoro for ADHD — one short sprint at a time</span></div>`:""}
      </div>`;
      if(curBlockIdx<day.blocks.length-1){
        const nb=day.blocks[curBlockIdx+1];
        const C2={Spirit:"#D4537E",Body:"#5DCAA5",Health:"#D85A30",IBM:"#666",Career:"#7F77DD",Skills:"#1D9E75",CSCI:"#888780",Content:"#BA7517",Life:"#378ADD"};
        html+=`<div class="next-block"><div class="next-label">Up next · ${fmtH(nb.st)}</div><div class="next-name" style="color:${C2[nb.tag]||"#888"}">${nb.name}</div></div>`;
      }
    } else {
      html+=`<div style="background:var(--bg2);border-radius:12px;padding:20px;text-align:center;color:var(--sub);font-size:14px;border:0.5px solid var(--border)">No scheduled block right now.<br><span style="font-size:12px">Check the Day view for your full schedule.</span></div>`;
    }
    html+=`<button class="rescue-toggle" onclick="showRescue=!showRescue;render()">😵 Overwhelmed? Open rescue mode</button>`;
    if(showRescue){
      const rescues=[["Ground first","5 breaths + water. Nothing else yet."],["Tiniest job task","Open resume. Change one word. Done."],["Eat something","Doesn't have to be perfect. Just eat."],["Move","Stand up. Walk around. 2 minutes."],["Text Tirth","One kind thing. That's all."],["Reset screen","Close everything. One tab only."]];
      html+=`<div class="rescue-panel"><div class="rescue-title">Pick just one tiny thing</div><div class="rescue-grid">${rescues.map(([t,s])=>`<div class="rescue-item" onclick="showRescue=false;render()"><b>${t}</b><span>${s}</span></div>`).join("")}</div></div>`;
    }
  }

  // DAY VIEW
  if(view==="day"){
    const C={Spirit:{color:"#D4537E",bg:"#FBEAF0",tc:"#72243E"},Body:{color:"#5DCAA5",bg:"#E1F5EE",tc:"#085041"},Health:{color:"#D85A30",bg:"#FAECE7",tc:"#712B13"},IBM:{color:"#666",bg:"#F1EFE8",tc:"#333"},Career:{color:"#7F77DD",bg:"#EEEDFE",tc:"#3C3489"},Skills:{color:"#1D9E75",bg:"#E1F5EE",tc:"#085041"},CSCI:{color:"#888780",bg:"#F1EFE8",tc:"#444441"},Content:{color:"#BA7517",bg:"#FAEEDA",tc:"#633806"},Life:{color:"#378ADD",bg:"#E6F1FB",tc:"#0C447C"}};
    html+=`<div style="margin-bottom:12px"><div style="font-size:17px;font-weight:600;color:var(--text)">${day.name}</div><span style="font-size:12px;padding:3px 10px;border-radius:100px;background:${day.tb};color:${day.tc};font-weight:500;display:inline-block;margin-top:4px">${day.theme}</span><div style="font-size:13px;color:var(--sub);margin-top:6px;line-height:1.6">${day.intent}</div></div>`;
    day.blocks.forEach((b,bi)=>{
      if(!state[day.name][bi])state[day.name][bi]={};
      b.tasks.forEach((_,j)=>{if(state[day.name][bi][j]===undefined)state[day.name][bi][j]=false;});
      const col=C[b.tag]||C.Life;
      const tasks=state[day.name][bi];
      const done=Object.values(tasks).filter(Boolean).length;
      const isCurrent=bi===curBlockIdx,isPast=now>=b.en;
      const isOpen=openBlocks[`${activeDayIdx}-${bi}`]||isCurrent;
      html+=`<div class="block-card${isCurrent?" current":""}${isPast?" past":""}" style="${isCurrent?`border-color:${col.color}`:""}">
        <div class="block-head" onclick="openBlocks['${activeDayIdx}-${bi}']=!openBlocks['${activeDayIdx}-${bi}'];render()">
          <div class="block-time">${fmtH(b.st)}</div>
          <div class="block-name" style="color:${isCurrent?col.color:"var(--text)"}">${b.name}${b.fixed?`<span class="fixed-badge">fixed</span>`:""}</div>
          <span class="tag-pill" style="background:${col.bg};color:${col.tc}">${b.tag}</span>
          ${done>0?`<span class="block-prog">${done}/${b.tasks.length}</span>`:""}
          <span class="chevron${isOpen?" open":""}">⌄</span>
        </div>
        ${isOpen?`<div class="block-body open">
          ${b.meals&&b.meals.length?foodHTML(b.meals):""}
          ${b.tasks.map((t,ti)=>`<div class="task-row" onclick="toggle('${day.name}',${bi},${ti})">
            <div class="chk" style="border-color:${tasks[ti]?"#7F77DD":"var(--border)"};background:${tasks[ti]?"#7F77DD":"transparent"}">${tasks[ti]?"✓":""}</div>
            <div class="task-text${tasks[ti]?" done":""}">${t}</div>
          </div>`).join("")}
          ${b.note?`<div class="block-note">${b.note}</div>`:""}
          ${!b.fixed?`<div class="pomo-wrap"><button class="mini-timer-btn" onclick="startTimer('${b.name}','${col.color}')">▶ 25-min timer</button><span class="pomo-tag">🍅 Pomodoro for ADHD</span></div>`:""}
        </div>`:""}
      </div>`;
    });
  }

  // WEEK VIEW
  if(view==="week"){
    html+=`<div style="font-size:13px;color:var(--sub);margin-bottom:12px">Your week at a glance — tap to switch days.</div>`;
    DAYS.forEach((d,i)=>{
      const{done,total}=getDayStats(d.name,d.blocks);
      const p=Math.round(done/total*100);
      html+=`<div class="week-row${i===tIdx?" today":""}" onclick="activeDayIdx=${i};view='day';render()">
        <div class="week-day" style="color:${i===tIdx?"#7F77DD":"var(--text)"}">${d.short}</div>
        <div class="week-meta"><div class="week-theme">${d.theme}</div><div class="week-bar"><div class="week-fill" style="width:${p}%;background:${d.tc}"></div></div></div>
        <div class="week-count">${done}/${total}</div>
      </div>`;
    });
  }

  html+=`</div>`;
  document.getElementById("app").innerHTML=html;
  renderTimer();
}

setInterval(()=>{const el=document.getElementById("clk");if(el)el.textContent=fmtClock();},1000);
archiveStateFor(getWeekId(),state);
render();

if(SYNC_ON){
  syncFromRemote();
  setInterval(syncFromRemote,20000);
  document.addEventListener("visibilitychange",()=>{if(!document.hidden)syncFromRemote();});
}
</script>
</body>
</html>
