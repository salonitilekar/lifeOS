name: Build iOS IPA

on:
  push:
    branches: [ main ]
    paths:
      - "index.html"
      - "inline-logo.png"
      - "ios/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Stage web assets
        run: |
          mkdir -p ios/www
          cp index.html ios/www/index.html
          cp inline-logo.png ios/www/inline-logo.png

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build unsigned app
        working-directory: ios
        run: |
          xcodebuild \
            -project LifeOS.xcodeproj \
            -scheme LifeOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package IPA
        working-directory: ios
        run: |
          APP="build/Build/Products/Release-iphoneos/LifeOS.app"
          if [ ! -d "$APP" ]; then echo "Build product not found at $APP"; exit 1; fi
          rm -rf Payload LifeOS.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r LifeOS.ipa Payload >/dev/null
          rm -rf Payload
          echo "Created ios/LifeOS.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LifeOS-ipa
          path: ios/LifeOS.ipa
          if-no-files-found: error
